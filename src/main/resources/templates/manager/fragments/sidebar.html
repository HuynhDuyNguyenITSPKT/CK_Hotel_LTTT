<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<aside class="relative overflow-hidden bg-slate-950 text-slate-100 lg:sticky lg:top-0 lg:h-screen lg:overflow-y-auto"
       th:fragment="sidebar(currentUser, activeTab, selectedTrendDays, q, roomStatusFilter, filterDay, filterMonth, filterYear)">
    <div class="pointer-events-none absolute inset-0 bg-[radial-gradient(circle_at_0%_0%,rgba(45,212,191,0.28),transparent_42%),radial-gradient(circle_at_100%_8%,rgba(249,115,22,0.24),transparent_36%)]"></div>

    <div class="relative border-b border-slate-800/90 px-6 py-6">
        <span class="inline-flex items-center rounded-full border border-emerald-300/40 bg-emerald-200/10 px-2.5 py-1 text-[10px] font-semibold uppercase tracking-[0.2em] text-emerald-200">Manager</span>
        <h1 class="mt-3 text-lg font-bold"><i class="fa-solid fa-chart-line mr-2 text-teal-300"></i>Manager Dashboard</h1>
        <p class="mt-2 text-sm text-slate-300" th:text="'Xin chào, ' + ${currentUser.employeeName}"></p>
    </div>

    <nav class="relative space-y-1.5 px-3 py-4 text-sm">
        <a class="block rounded-xl px-3 py-2.5 transition hover:bg-slate-800/80"
           th:classappend="${activeTab == 'tong-quan'} ? ' bg-slate-800 ring-1 ring-slate-700'"
           th:href="@{/manager/dashboard(tab='tong-quan',days=${selectedTrendDays},day=${filterDay},month=${filterMonth},year=${filterYear})}">
            <i class="fa-solid fa-chart-column mr-2"></i>Tổng quan
        </a>
        <a class="block rounded-xl px-3 py-2.5 transition hover:bg-slate-800/80"
           th:classappend="${activeTab == 'bao-cao'} ? ' bg-slate-800 ring-1 ring-slate-700'"
           th:href="@{/manager/dashboard(tab='bao-cao',days=${selectedTrendDays},day=${filterDay},month=${filterMonth},year=${filterYear})}">
            <i class="fa-solid fa-file-lines mr-2"></i>Báo cáo
        </a>
        <a class="block rounded-xl px-3 py-2.5 transition hover:bg-slate-800/80"
           th:classappend="${activeTab == 'quan-ly-phong'} ? ' bg-slate-800 ring-1 ring-slate-700'"
           th:href="@{/manager/dashboard(tab='quan-ly-phong',days=${selectedTrendDays},q=${q},roomStatus=${roomStatusFilter})}">
            <i class="fa-solid fa-bed mr-2"></i>Quản lý phòng
        </a>
        <a class="block rounded-xl px-3 py-2.5 transition hover:bg-slate-800/80"
           th:classappend="${activeTab == 'quan-ly-khuyen-mai'} ? ' bg-slate-800 ring-1 ring-slate-700'"
           th:href="@{/manager/dashboard(tab='quan-ly-khuyen-mai',days=${selectedTrendDays},q=${q})}">
            <i class="fa-solid fa-tags mr-2"></i>Quản lý khuyến mãi
        </a>
    </nav>

    <div class="relative mt-auto px-5 pb-6">
        <form method="post" th:action="@{/logout}">
            <button class="w-full rounded-xl bg-rose-600 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-rose-700" type="submit">Đăng xuất</button>
        </form>
    </div>
</aside>
</body>
</html>
