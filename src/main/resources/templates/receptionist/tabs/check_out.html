<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<section class="space-y-4" id="section-check-out" th:fragment="panel" th:if="${activeTab == 'check-out'}">
    <div class="flex flex-wrap items-center justify-between gap-2">
        <h2 class="text-2xl font-bold">Check-out</h2>
        <span class="rounded-full bg-emerald-100 px-3 py-1 text-xs font-semibold text-emerald-700">Thu tiền đủ hóa đơn trước, sau đó mới check-out</span>
    </div>

    <section class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
        <div class="overflow-x-auto">
            <table class="min-w-full text-sm">
                <thead>
                <tr class="border-b text-left">
                    <th class="p-2">Mã đặt phòng</th>
                    <th class="p-2">Khách hàng</th>
                    <th class="p-2">Số phòng</th>
                    <th class="p-2">Ngày trả</th>
                    <th class="p-2">Tổng hóa đơn</th>
                    <th class="p-2">Đã thanh toán</th>
                    <th class="p-2">Còn lại</th>
                    <th class="p-2">Thanh toán</th>
                    <th class="p-2">Trạng thái booking</th>
                    <th class="p-2">Hành động</th>
                </tr>
                </thead>
                <tbody>
                <tr class="border-b" th:classappend="${iter.odd} ? ' bg-slate-50'" th:each="row,iter : ${danhSachCheckOut}">
                    <td class="p-2 font-semibold text-slate-700" th:text="${row.maDatPhong}"></td>
                    <td class="p-2" th:text="${row.tenKhachHang}"></td>
                    <td class="p-2" th:text="${row.soPhong}"></td>
                    <td class="p-2" th:text="${#temporals.format(row.ngayTra, 'dd/MM/yyyy')}"></td>
                    <td class="p-2 font-semibold text-orange-700" th:text="${#numbers.formatDecimal(row.tongTienTamTinh, 0, 'COMMA', 0, 'POINT')} + ' VND'"></td>
                    <td class="p-2 font-medium text-sky-700" th:text="${#numbers.formatDecimal(row.tongDaThanhToan, 0, 'COMMA', 0, 'POINT')} + ' VND'"></td>
                    <td class="p-2 font-semibold" th:classappend="${row.daThanhToanDu} ? ' text-emerald-700' : ' text-rose-700'"
                        th:text="${#numbers.formatDecimal(row.soTienConLai, 0, 'COMMA', 0, 'POINT')} + ' VND'"></td>
                    <td class="p-2">
                        <span class="rounded-full px-2 py-1 text-xs font-semibold"
                              th:classappend="${row.sacThaiThanhToan == 'amber'} ? ' bg-amber-100 text-amber-700' : (${row.sacThaiThanhToan == 'sky'} ? ' bg-sky-100 text-sky-700' : (${row.sacThaiThanhToan == 'emerald'} ? ' bg-emerald-100 text-emerald-700' : ' bg-slate-100 text-slate-700'))"
                              th:text="${row.trangThaiThanhToan}"></span>
                    </td>
                    <td class="p-2" th:text="${row.trangThaiDatPhong}"></td>
                    <td class="p-2">
                        <div class="space-y-2">
                            <form class="grid gap-2" method="post" th:action="@{/receptionist/dat-phong/{id}/dich-vu(id=${row.datPhongId})}"
                                  th:if="${row.trangThaiDatPhong.name() == 'CHECKED_IN'}">
                                <select class="w-full rounded-lg border px-2 py-1 text-xs" name="dichVuId">
                                    <option th:each="dv : ${danhSachDichVu}" th:text="${dv.tenDichVu} + ' - ' + ${#numbers.formatDecimal(dv.gia, 0, 'COMMA', 0, 'POINT')} + ' VND'" th:value="${dv.dichVuId}"></option>
                                </select>
                                <div class="grid grid-cols-2 gap-2">
                                    <input class="w-full rounded-lg border px-2 py-1 text-xs" min="1" name="soLuong" step="1" type="number" value="1">
                                    <button class="rounded-lg bg-indigo-600 px-3 py-1 text-xs font-semibold text-white transition hover:bg-indigo-700" type="submit">Thêm dịch vụ</button>
                                </div>
                            </form>

                            <form class="grid gap-2" method="post" th:action="@{/receptionist/thanh-toan/{id}(id=${row.datPhongId})}"
                                  th:if="${row.trangThaiDatPhong.name() == 'CHECKED_IN' and !row.daThanhToanDu}">
                                <input class="w-full rounded-lg border px-2 py-1 text-xs" min="1" name="soTienThanhToan"
                                       step="1" th:attr="max=${row.soTienConLai.longValue()}" th:value="${row.soTienConLai.longValue()}" type="number">
                                <select class="w-full rounded-lg border px-2 py-1 text-xs" name="phuongThuc">
                                    <option th:each="method : ${paymentMethods}" th:text="${method}" th:value="${method}"></option>
                                </select>
                                <button class="rounded-lg bg-sky-600 px-3 py-1 text-xs font-semibold text-white transition hover:bg-sky-700" type="submit">Thu tiền</button>
                            </form>

                            <form method="post" th:action="@{/receptionist/check-out/{id}(id=${row.datPhongId})}">
                                <button class="w-full rounded-lg bg-emerald-600 px-3 py-1 text-xs font-semibold text-white transition hover:bg-emerald-700"
                                        th:disabled="${row.trangThaiDatPhong.name() != 'CHECKED_IN' or !row.daThanhToanDu}"
                                        type="submit">Check-out</button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(danhSachCheckOut)}">
                    <td class="p-3 text-center text-slate-500" colspan="10">Không có booking check-out.</td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="mt-4 flex items-center justify-between text-sm text-slate-600" th:if="${totalPages > 1}">
            <p th:text="'Trang ' + ${page} + ' / ' + ${totalPages} + ' - Tổng: ' + ${totalItems}"></p>
            <div class="flex gap-2">
                <a class="rounded border px-3 py-1 hover:bg-slate-100" th:href="@{/receptionist/dashboard(tab='check-out',page=${page-1},size=${size})}" th:if="${hasPrev}">Trước</a>
                <a class="rounded border px-3 py-1 hover:bg-slate-100" th:href="@{/receptionist/dashboard(tab='check-out',page=${page+1},size=${size})}" th:if="${hasNext}">Sau</a>
            </div>
        </div>
    </section>
</section>
</body>
</html>
