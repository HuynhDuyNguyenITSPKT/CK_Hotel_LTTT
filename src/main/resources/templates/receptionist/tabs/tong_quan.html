<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<section class="space-y-6" id="section-tong-quan" th:fragment="panel" th:if="${activeTab == 'tong-quan'}">
    <div class="grid gap-4 sm:grid-cols-2 xl:grid-cols-5">
        <article class="rounded-2xl bg-gradient-to-r p-4 text-white shadow-sm" th:classappend="${item.gradientCss}" th:each="item : ${thongKeNhanh}">
            <div class="flex items-start justify-between gap-3">
                <div>
                    <p class="text-sm text-white/85" th:text="${item.tieuDe}"></p>
                    <p class="mt-2 text-2xl font-bold" th:text="${item.giaTri}"></p>
                    <p class="mt-1 text-xs text-white/90" th:text="${item.moTa}"></p>
                </div>
                <span class="rounded-lg bg-white/20 p-2 text-base"><i th:class="${item.iconCss}"></i></span>
            </div>
        </article>
    </div>

    <div class="grid gap-4 xl:grid-cols-3">
        <section class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
            <h3 class="mb-3 text-lg font-semibold">Danh sách check-in sắp tới</h3>
            <ul class="space-y-2 text-sm">
                <li class="rounded-xl border border-slate-200 px-3 py-2" th:each="row : ${danhSachCheckInNhanh}">
                    <p class="font-semibold text-slate-800" th:text="${row.tenKhachHang} + ' - ' + ${row.soPhong}"></p>
                    <p class="text-slate-500" th:text="${#temporals.format(row.ngayNhan, 'dd/MM')} + ' đến ' + ${#temporals.format(row.ngayTra, 'dd/MM')}"></p>
                </li>
                <li class="rounded-xl border border-slate-200 px-3 py-2 text-slate-500" th:if="${#lists.isEmpty(danhSachCheckInNhanh)}">Không có dữ liệu.</li>
            </ul>
        </section>

        <section class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
            <h3 class="mb-3 text-lg font-semibold">Danh sách check-out sắp tới</h3>
            <ul class="space-y-2 text-sm">
                <li class="rounded-xl border border-slate-200 px-3 py-2" th:each="row : ${danhSachCheckOutNhanh}">
                    <p class="font-semibold text-slate-800" th:text="${row.tenKhachHang} + ' - ' + ${row.soPhong}"></p>
                    <p class="text-slate-500" th:text="${#temporals.format(row.ngayTra, 'dd/MM')} + ' - ' + ${row.trangThaiThanhToan}"></p>
                </li>
                <li class="rounded-xl border border-slate-200 px-3 py-2 text-slate-500" th:if="${#lists.isEmpty(danhSachCheckOutNhanh)}">Không có dữ liệu.</li>
            </ul>
        </section>

        <section class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
            <h3 class="mb-3 text-lg font-semibold">Booking mới nhất</h3>
            <ul class="space-y-2 text-sm">
                <li class="rounded-xl border border-slate-200 px-3 py-2" th:each="row : ${danhSachDatPhongNhanh}">
                    <p class="font-semibold text-slate-800" th:text="${row.maDatPhong} + ' - ' + ${row.tenKhachHang}"></p>
                    <p class="text-slate-500" th:text="${row.soPhong} + ' - ' + ${row.trangThai}"></p>
                </li>
                <li class="rounded-xl border border-slate-200 px-3 py-2 text-slate-500" th:if="${#lists.isEmpty(danhSachDatPhongNhanh)}">Không có dữ liệu.</li>
            </ul>
        </section>
    </div>
</section>
</body>
</html>
