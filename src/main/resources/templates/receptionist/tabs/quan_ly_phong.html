<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<section class="space-y-4" id="section-quan-ly-phong" th:fragment="panel" th:if="${activeTab == 'quan-ly-phong'}">
    <div class="flex flex-wrap items-center justify-between gap-2">
        <h2 class="text-2xl font-bold">Quản lý phòng</h2>
        <span class="rounded-full bg-indigo-100 px-3 py-1 text-xs font-semibold text-indigo-700">Cập nhật nhanh trạng thái phòng tại quầy</span>
    </div>

    <section class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
        <div class="overflow-x-auto">
            <table class="min-w-full text-sm">
                <thead>
                <tr class="border-b text-left">
                    <th class="p-2">Số phòng</th>
                    <th class="p-2">Loại phòng</th>
                    <th class="p-2">Giá cơ bản</th>
                    <th class="p-2">Trạng thái</th>
                    <th class="p-2">Ảnh</th>
                    <th class="p-2">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr class="border-b" th:classappend="${iter.odd} ? ' bg-slate-50'" th:each="row,iter : ${danhSachPhong}">
                    <td class="p-2 font-semibold text-slate-700" th:text="${row.soPhong}"></td>
                    <td class="p-2" th:text="${row.tenLoaiPhong}"></td>
                    <td class="p-2 text-orange-700" th:text="${#numbers.formatDecimal(row.giaCoBan, 0, 'COMMA', 0, 'POINT')} + ' VND'"></td>
                    <td class="p-2" th:text="${row.trangThai}"></td>
                    <td class="p-2">
                        <img alt="Room" class="h-14 w-24 rounded-lg object-cover ring-1 ring-slate-200" th:if="${row.imageUrl}" th:src="${row.imageUrl}">
                        <span class="text-slate-400" th:if="${row.imageUrl == null or row.imageUrl.isBlank()}">Không có</span>
                    </td>
                    <td class="p-2">
                        <button class="js-open-room-status-form rounded-lg bg-slate-900 px-3 py-1 text-xs font-semibold text-white transition hover:bg-slate-700"
                                th:attr="data-action=@{/receptionist/rooms/{id}/status(id=${row.phongId})},data-room=${row.soPhong},data-room-type=${row.tenLoaiPhong},data-current-status=${row.trangThai}"
                                type="button">Cập nhật</button>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(danhSachPhong)}">
                    <td class="p-3 text-center text-slate-500" colspan="6">Không có phòng.</td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="mt-4 flex flex-wrap items-center justify-between gap-3 text-sm text-slate-600" th:if="${totalPages > 1}">
            <p th:text="'Trang ' + ${page} + ' / ' + ${totalPages} + ' - Tổng: ' + ${totalItems}"></p>
            <div class="flex flex-wrap items-center gap-1">
                <a class="rounded border px-3 py-1 hover:bg-slate-100" th:href="@{/receptionist/dashboard(tab='quan-ly-phong',page=${page-1},size=${size})}" th:if="${hasPrev}">Trước</a>

                <a class="rounded border px-3 py-1"
                   th:classappend="${p == page} ? ' border-slate-900 bg-slate-900 text-white' : ' hover:bg-slate-100'"
                   th:each="p : ${#numbers.sequence(1, totalPages)}"
                   th:href="@{/receptionist/dashboard(tab='quan-ly-phong',page=${p},size=${size})}"
                   th:text="${p}"></a>

                <a class="rounded border px-3 py-1 hover:bg-slate-100" th:href="@{/receptionist/dashboard(tab='quan-ly-phong',page=${page+1},size=${size})}" th:if="${hasNext}">Sau</a>
            </div>
        </div>

        <dialog class="w-full max-w-xl rounded-2xl border border-slate-200 p-0 shadow-2xl backdrop:bg-slate-900/40"
                id="roomStatusDialog">
            <div class="rounded-2xl bg-white">
                <div class="flex items-center justify-between border-b border-slate-200 px-4 py-3">
                    <div>
                        <p class="text-xs font-semibold uppercase tracking-wide text-slate-600">Form dialog</p>
                        <h4 class="text-base font-semibold text-slate-800">Cập nhật trạng thái phòng</h4>
                    </div>
                    <button class="rounded-lg px-2 py-1 text-slate-500 transition hover:bg-slate-100 hover:text-slate-700"
                            id="roomStatusDialogCloseX"
                            type="button">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>

                <div class="space-y-4 px-4 py-4">
                    <p class="text-sm text-slate-600" id="roomStatusSelectedRoom">Chưa chọn phòng.</p>

                    <form class="flex flex-wrap items-center gap-3"
                          id="roomStatusForm"
                          method="post">
                        <select class="rounded-lg border px-3 py-2 text-sm" id="roomStatusSelect" name="trangThai">
                            <option th:each="status : ${roomStatuses}" th:text="${status}" th:value="${status}"></option>
                        </select>
                        <button class="rounded-lg bg-slate-900 px-4 py-2 text-sm font-semibold text-white transition hover:bg-slate-700 disabled:cursor-not-allowed disabled:opacity-60"
                                id="roomStatusSubmitBtn"
                                type="submit"
                                disabled>Cập nhật trạng thái</button>
                    </form>
                </div>

                <div class="border-t border-slate-200 px-4 py-3 text-right">
                    <button class="rounded-lg border border-slate-300 px-3 py-1.5 text-sm font-semibold text-slate-700 transition hover:bg-slate-100"
                            id="roomStatusDialogCloseBtn"
                            type="button">Đóng</button>
                </div>
            </div>
        </dialog>

        <script>
            (function () {
                const triggerButtons = document.querySelectorAll(".js-open-room-status-form");
                const form = document.getElementById("roomStatusForm");
                const selectedRoomText = document.getElementById("roomStatusSelectedRoom");
                const statusSelect = document.getElementById("roomStatusSelect");
                const submitBtn = document.getElementById("roomStatusSubmitBtn");
                const dialog = document.getElementById("roomStatusDialog");
                const closeBtn = document.getElementById("roomStatusDialogCloseBtn");
                const closeBtnX = document.getElementById("roomStatusDialogCloseX");

                if (!form || !selectedRoomText || !statusSelect || !submitBtn || !dialog) {
                    return;
                }

                const closeDialog = () => dialog.close();
                closeBtn?.addEventListener("click", closeDialog);
                closeBtnX?.addEventListener("click", closeDialog);
                dialog.addEventListener("click", (event) => {
                    const rect = dialog.getBoundingClientRect();
                    const insideDialog = rect.top <= event.clientY
                        && event.clientY <= rect.bottom
                        && rect.left <= event.clientX
                        && event.clientX <= rect.right;
                    if (!insideDialog) {
                        dialog.close();
                    }
                });

                triggerButtons.forEach((button) => {
                    button.addEventListener("click", () => {
                        const action = button.getAttribute("data-action") || "";
                        const room = button.getAttribute("data-room") || "";
                        const roomType = button.getAttribute("data-room-type") || "";
                        const currentStatus = button.getAttribute("data-current-status") || "";

                        form.setAttribute("action", action);
                        statusSelect.value = currentStatus;
                        submitBtn.disabled = !action;
                        selectedRoomText.textContent = `Đang thao tác phòng ${room} - ${roomType}.`;
                        dialog.showModal();
                    });
                });
            })();
        </script>
    </section>
</section>
</body>
</html>
