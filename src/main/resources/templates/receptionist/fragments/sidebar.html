<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<aside class="relative overflow-hidden bg-slate-950 text-slate-100 lg:sticky lg:top-0 lg:h-screen lg:overflow-y-auto" th:fragment="sidebar(currentUser, activeTab)">
    <div class="pointer-events-none absolute inset-0 bg-[radial-gradient(circle_at_0%_0%,rgba(56,189,248,0.38),transparent_42%),radial-gradient(circle_at_100%_8%,rgba(16,185,129,0.30),transparent_36%)]"></div>
    <div class="relative border-b border-slate-800/90 px-6 py-6">
        <span class="inline-flex items-center rounded-full border border-cyan-300/40 bg-cyan-200/10 px-2.5 py-1 text-[10px] font-semibold uppercase tracking-[0.2em] text-cyan-200">Quầy lễ tân</span>
        <h1 class="mt-3 text-lg font-bold"><i class="fa-solid fa-bell-concierge mr-2 text-emerald-300"></i>Lễ tân khách sạn</h1>
        <p class="mt-2 text-sm text-slate-300" th:text="'Xin chào, ' + ${currentUser.employeeName}"></p>
    </div>
    <nav class="relative space-y-1.5 px-3 py-4 text-sm">
        <a class="block w-full rounded-xl px-3 py-2.5 transition hover:bg-slate-800/80" th:classappend="${activeTab == 'tong-quan'} ? ' bg-slate-800 ring-1 ring-slate-700'" th:href="@{/receptionist/dashboard(tab='tong-quan')}">
            <i class="fa-solid fa-chart-column mr-2"></i>Tổng quan nhanh
        </a>
        <a class="block w-full rounded-xl px-3 py-2.5 transition hover:bg-slate-800/80" th:classappend="${activeTab == 'check-in'} ? ' bg-slate-800 ring-1 ring-slate-700'" th:href="@{/receptionist/dashboard(tab='check-in')}">
            <i class="fa-solid fa-door-open mr-2"></i>Check-in
        </a>
        <a class="block w-full rounded-xl px-3 py-2.5 transition hover:bg-slate-800/80" th:classappend="${activeTab == 'check-out'} ? ' bg-slate-800 ring-1 ring-slate-700'" th:href="@{/receptionist/dashboard(tab='check-out')}">
            <i class="fa-solid fa-door-closed mr-2"></i>Check-out
        </a>
        <a class="block w-full rounded-xl px-3 py-2.5 transition hover:bg-slate-800/80" th:classappend="${activeTab == 'quan-ly-phong'} ? ' bg-slate-800 ring-1 ring-slate-700'" th:href="@{/receptionist/dashboard(tab='quan-ly-phong')}">
            <i class="fa-solid fa-bed mr-2"></i>Quản lý phòng
        </a>
        <a class="block w-full rounded-xl px-3 py-2.5 transition hover:bg-slate-800/80" th:classappend="${activeTab == 'dat-phong'} ? ' bg-slate-800 ring-1 ring-slate-700'" th:href="@{/receptionist/dashboard(tab='dat-phong')}">
            <i class="fa-solid fa-calendar-check mr-2"></i>Đặt phòng
        </a>
        <a class="block w-full rounded-xl px-3 py-2.5 transition hover:bg-slate-800/80" th:classappend="${activeTab == 'hoa-don-thanh-toan'} ? ' bg-slate-800 ring-1 ring-slate-700'" th:href="@{/receptionist/dashboard(tab='hoa-don-thanh-toan')}">
            <i class="fa-solid fa-file-invoice-dollar mr-2"></i>Hóa đơn & thanh toán
        </a>
    </nav>
    <div class="relative px-6 pb-6 pt-2">
        <form method="post" th:action="@{/logout}">
            <button class="w-full rounded-xl bg-rose-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-rose-700" type="submit">
                <i class="fa-solid fa-right-from-bracket mr-2"></i>Đăng xuất
            </button>
        </form>
    </div>
</aside>
</body>
</html>
