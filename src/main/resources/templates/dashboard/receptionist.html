<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bảng điều khiển lễ tân</title>
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-100 text-slate-800">
<div class="min-h-screen lg:grid lg:grid-cols-[260px_1fr]">
    <aside class="bg-emerald-800 text-emerald-50">
        <div class="px-6 py-5 border-b border-emerald-700">
            <h1 class="font-bold text-lg"><i class="fa-solid fa-bell-concierge mr-2"></i>Reception Panel</h1>
            <p class="text-sm text-emerald-200 mt-2" th:text="'Xin chào, ' + ${currentUser.employeeName}"></p>
        </div>
        <nav class="px-4 py-4 space-y-2 text-sm">
            <div class="rounded-lg bg-emerald-700 px-3 py-2"><i class="fa-solid fa-gauge mr-2"></i>Tổng quan</div>
            <div class="rounded-lg hover:bg-emerald-700 px-3 py-2"><i class="fa-solid fa-door-open mr-2"></i>Check-in nhanh</div>
            <div class="rounded-lg hover:bg-emerald-700 px-3 py-2"><i class="fa-solid fa-door-closed mr-2"></i>Check-out</div>
            <div class="rounded-lg hover:bg-emerald-700 px-3 py-2"><i class="fa-solid fa-file-invoice-dollar mr-2"></i>Hóa đơn</div>
        </nav>
        <div class="px-6 pb-6">
            <form method="post" th:action="@{/logout}">
                <button class="w-full rounded-lg bg-rose-600 px-4 py-2 text-sm font-semibold text-white hover:bg-rose-700" type="submit">Đăng xuất</button>
            </form>
        </div>
    </aside>

    <main class="p-6 space-y-4">
        <h2 class="text-2xl font-bold">Bảng điều khiển lễ tân</h2>
        <section class="rounded-xl bg-white p-4 shadow-sm">
            <h3 class="font-semibold">Check-in nhanh</h3>
            <form class="mt-3 grid gap-3 md:grid-cols-3">
                <input class="rounded-lg border px-3 py-2" placeholder="Tên khách" type="text">
                <input class="rounded-lg border px-3 py-2" placeholder="Số phòng" type="text">
                <button class="rounded-lg bg-emerald-700 px-4 py-2 text-white" type="button">Xác nhận check-in</button>
            </form>
        </section>
        <section class="rounded-xl bg-white p-4 shadow-sm">
            <h3 class="font-semibold">Yêu cầu đang xử lý</h3>
            <div class="mt-3 overflow-x-auto">
                <table class="min-w-full text-sm">
                    <thead><tr class="border-b text-left"><th class="p-2">Khách hàng</th><th class="p-2">Loại yêu cầu</th><th class="p-2">Trạng thái</th></tr></thead>
                    <tbody>
                    <tr class="border-b"><td class="p-2">Trần Thị B</td><td class="p-2">Check-out</td><td class="p-2"><span class="rounded-full bg-amber-100 px-2 py-1 text-amber-700">Chờ xử lý</span></td></tr>
                    <tr class="border-b"><td class="p-2">Phạm Văn C</td><td class="p-2">Gia hạn phòng</td><td class="p-2"><span class="rounded-full bg-cyan-100 px-2 py-1 text-cyan-700">Đã tiếp nhận</span></td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>
</body>
</html>
