<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bảng điều khiển lễ tân</title>
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg bg-success navbar-dark shadow-sm">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-semibold" th:href="@{/receptionist/dashboard}">Hotel Reception</a>
        <div class="d-flex align-items-center gap-3 text-white">
            <span class="small" th:text="'Xin chào, ' + ${currentUser.employeeName}"></span>
            <form class="m-0" method="post" th:action="@{/logout}">
                <button class="btn btn-outline-light btn-sm" type="submit">Đăng xuất</button>
            </form>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 m-0">Bảng điều khiển lễ tân</h1>
        <span class="badge text-bg-success">Role: RECEPTIONIST</span>
    </div>

    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <h2 class="h5 mb-3">Check-in nhanh</h2>
            <form class="row g-3">
                <div class="col-md-4">
                    <label class="form-label" for="guestName">Tên khách</label>
                    <input class="form-control" id="guestName" placeholder="Nguyễn Văn A" type="text">
                </div>
                <div class="col-md-4">
                    <label class="form-label" for="roomCode">Phòng</label>
                    <input class="form-control" id="roomCode" placeholder="P-305" type="text">
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <button class="btn btn-success w-100" type="button">Xác nhận check-in</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <h2 class="h5 mb-3">Danh sách cần xử lý</h2>
            <div class="table-responsive">
                <table class="table table-striped mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>Khách hàng</th>
                        <th>Loại yêu cầu</th>
                        <th>Trạng thái</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr>
                        <td>Trần Thị B</td>
                        <td>Check-out</td>
                        <td><span class="badge text-bg-warning">Chờ xử lý</span></td>
                    </tr>
                    <tr>
                        <td>Phạm Văn C</td>
                        <td>Gia hạn phòng</td>
                        <td><span class="badge text-bg-info">Đã tiếp nhận</span></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<script crossorigin="anonymous" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
