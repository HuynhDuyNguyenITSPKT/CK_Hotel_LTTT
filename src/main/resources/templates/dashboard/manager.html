<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bảng điều khiển quản lý</title>
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg bg-primary navbar-dark shadow-sm">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-semibold" th:href="@{/manager/dashboard}">Hotel Manager</a>
        <div class="d-flex align-items-center gap-3 text-white">
            <span class="small" th:text="'Xin chào, ' + ${currentUser.employeeName}"></span>
            <form class="m-0" method="post" th:action="@{/logout}">
                <button class="btn btn-outline-light btn-sm" type="submit">Đăng xuất</button>
            </form>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 m-0">Bảng điều khiển quản lý</h1>
        <span class="badge text-bg-primary">Role: MANAGER</span>
    </div>

    <div class="row g-4 mb-4">
        <div class="col-md-4">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body">
                    <h2 class="h6 text-secondary">Phòng trống hôm nay</h2>
                    <p class="display-6 fw-semibold mb-0">24</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body">
                    <h2 class="h6 text-secondary">Đặt phòng chờ xử lý</h2>
                    <p class="display-6 fw-semibold mb-0">08</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body">
                    <h2 class="h6 text-secondary">Doanh thu dự kiến</h2>
                    <p class="display-6 fw-semibold mb-0">42M</p>
                </div>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <h2 class="h5">Công việc ưu tiên</h2>
            <ul class="mb-0">
                <li>Kiểm tra tình trạng phòng sắp check-in.</li>
                <li>Duyệt danh sách đặt phòng online.</li>
                <li>Phân công ca trực cho nhân viên lễ tân.</li>
            </ul>
        </div>
    </div>
</main>

<script crossorigin="anonymous" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
