<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<section class="hidden section-panel mt-6 rounded-xl bg-white p-4 shadow-sm space-y-4" id="section-customers" th:fragment="panel">
    <h3 class="text-lg font-semibold">Quản lý khách hàng</h3>
    <form class="grid gap-3 md:grid-cols-3" id="form-customer-create">
        <input class="rounded-lg border px-3 py-2" name="ten" placeholder="Tên khách hàng" required>
        <input class="rounded-lg border px-3 py-2" name="sdt" placeholder="Số điện thoại" required>
        <input class="rounded-lg border px-3 py-2" name="email" placeholder="Email" type="email">
        <button class="rounded-lg bg-indigo-600 px-4 py-2 text-white md:col-span-3" type="submit">Thêm khách hàng</button>
    </form>
    <div class="overflow-x-auto"><table class="min-w-full text-sm"><thead><tr class="border-b text-left"><th class="p-2">Tên</th><th class="p-2">SĐT</th><th class="p-2">Email</th><th class="p-2">Thao tác</th></tr></thead><tbody id="table-customers"></tbody></table></div>
</section>
</body>
</html>
