<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<section class="mt-6 space-y-4" id="section-customers" th:fragment="panel" th:if="${activeTab == 'customers'}">
    <div class="rounded-xl border border-slate-200 bg-white shadow-sm overflow-hidden">
        <div class="flex flex-wrap items-center justify-between gap-3 border-b border-slate-200 bg-slate-50/70 px-5 py-4">
            <div>
                <h3 class="text-lg font-semibold text-slate-800">Quản lý khách hàng</h3>
                <p class="text-xs text-slate-500">Chuẩn hóa trải nghiệm nhập liệu và chỉnh sửa dữ liệu khách.</p>
            </div>
            <span class="inline-flex items-center gap-1.5 rounded-full border border-cyan-100 bg-cyan-50 px-2.5 py-1 text-xs font-semibold text-cyan-700">
                <i class="fa-solid fa-users text-[10px]"></i>
                Customer center
            </span>
        </div>

        <div class="px-5 py-4">
            <div class="flex flex-wrap items-center justify-between gap-3">
                <form class="flex min-w-[260px] flex-1 flex-wrap items-center gap-2" method="get" th:action="@{/admin/dashboard}">
                    <input name="tab" type="hidden" value="customers">
                    <input name="page" type="hidden" value="1">
                    <input class="min-w-[240px] flex-1 rounded-lg border border-slate-300 px-3 py-2 text-sm" name="q" placeholder="Tìm tên / số điện thoại / email" th:value="${q}">
                    <button class="rounded-lg bg-slate-900 px-4 py-2 text-sm font-semibold text-white transition hover:bg-slate-800" type="submit">Lọc</button>
                </form>
                <button class="inline-flex items-center gap-2 rounded-lg bg-blue-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-blue-700" id="openCreateCustomerBtn" type="button">
                    <i class="fa-solid fa-plus"></i>
                    Thêm khách hàng
                </button>
            </div>
        </div>
    </div>

    <div class="rounded-xl border border-slate-200 bg-white shadow-sm overflow-hidden">
        <div class="flex flex-wrap items-center justify-between gap-3 border-b border-slate-200 px-5 py-4">
            <h4 class="text-base font-semibold text-slate-800">Danh sách khách hàng</h4>
            <span class="text-xs text-slate-500" th:text="'Tổng: ' + ${totalItems}"></span>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full border-collapse text-sm">
                <thead>
                <tr class="border-b border-slate-200 bg-slate-50 text-left text-xs uppercase tracking-wider text-slate-500">
                    <th class="px-5 py-3.5 font-semibold">Tên</th>
                    <th class="px-5 py-3.5 font-semibold">SĐT</th>
                    <th class="px-5 py-3.5 font-semibold">Email</th>
                    <th class="px-5 py-3.5 text-center font-semibold">Chi tiết</th>
                    <th class="px-5 py-3.5 text-right font-semibold">Thao tác</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                <tr class="transition-colors hover:bg-slate-50/70" th:each="customer : ${customers}">
                    <td class="px-5 py-4 font-semibold text-slate-800" th:text="${customer.ten}"></td>
                    <td class="px-5 py-4 text-slate-700" th:text="${customer.sdt}"></td>
                    <td class="px-5 py-4 text-slate-700" th:text="${customer.email}"></td>
                    <td class="px-5 py-4 text-center">
                        <button class="rounded-md border border-teal-200 bg-teal-50 px-3 py-1.5 text-xs font-semibold text-teal-700 transition hover:bg-teal-100" data-detail-section="Khách hàng" data-row-detail-btn type="button">
                            Xem chi tiết
                        </button>
                    </td>
                    <td class="px-5 py-4 text-right">
                        <div class="flex items-center justify-end gap-2">
                            <button class="open-edit-customer-btn rounded-md p-2 text-slate-400 transition hover:bg-blue-50 hover:text-blue-600"
                                    th:attr="data-customer-id=${customer.id},data-customer-name=${customer.ten},data-customer-phone=${customer.sdt},data-customer-email=${customer.email}"
                                    title="Chỉnh sửa"
                                    type="button">
                                <i class="fa-solid fa-pen"></i>
                            </button>
                            <form method="post" th:action="@{/admin/customers/{id}/delete(id=${customer.id})}">
                                <button class="rounded-md p-2 text-slate-400 transition hover:bg-rose-50 hover:text-rose-600" title="Xóa" type="submit">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="mt-4 flex items-center justify-between text-sm text-slate-600" th:if="${totalPages > 1}">
        <p th:text="'Trang ' + ${page} + ' / ' + ${totalPages} + ' - Tổng: ' + ${totalItems}"></p>
        <div class="flex gap-2">
            <a class="rounded border px-3 py-1 hover:bg-slate-100" th:href="@{/admin/dashboard(tab='customers',page=${page-1},size=${size},q=${q})}" th:if="${hasPrev}">Trước</a>
            <a class="rounded border px-3 py-1 hover:bg-slate-100" th:href="@{/admin/dashboard(tab='customers',page=${page+1},size=${size},q=${q})}" th:if="${hasNext}">Sau</a>
        </div>
    </div>

    <div class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-900/55 p-4" id="customerFormModal">
        <div class="w-full max-w-2xl rounded-2xl bg-white shadow-2xl ring-1 ring-slate-200">
            <div class="flex items-center justify-between border-b border-slate-200 px-5 py-4">
                <h3 class="text-lg font-bold text-slate-800" id="customerFormTitle">Thêm khách hàng mới</h3>
                <button class="rounded-lg px-2 py-1 text-slate-500 transition hover:bg-slate-100 hover:text-slate-700" id="closeCustomerFormModalBtn" type="button">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <form class="grid gap-3 px-5 py-4 md:grid-cols-2" id="customerForm" method="post"
                  th:attr="data-create-url=@{/admin/customers},data-update-url-pattern=@{/admin/customers/{id}/update(id='__id__')}">
                <div class="md:col-span-2">
                    <label class="mb-1 block text-sm font-medium text-slate-700" for="customerNameInput">Tên khách hàng</label>
                    <input class="w-full rounded-lg border border-slate-300 px-3 py-2" id="customerNameInput" name="ten" required>
                </div>
                <div>
                    <label class="mb-1 block text-sm font-medium text-slate-700" for="customerPhoneInput">Số điện thoại</label>
                    <input class="w-full rounded-lg border border-slate-300 px-3 py-2" id="customerPhoneInput" name="sdt" required>
                </div>
                <div>
                    <label class="mb-1 block text-sm font-medium text-slate-700" for="customerEmailInput">Email</label>
                    <input class="w-full rounded-lg border border-slate-300 px-3 py-2" id="customerEmailInput" name="email" type="email">
                </div>

                <div class="md:col-span-2 flex justify-end gap-2 border-t border-slate-200 pt-3">
                    <button class="rounded-lg border border-slate-300 px-4 py-2 font-semibold text-slate-700 transition hover:bg-slate-100" id="cancelCustomerFormBtn" type="button">Hủy</button>
                    <button class="rounded-lg bg-blue-600 px-4 py-2 font-semibold text-white transition hover:bg-blue-700" id="submitCustomerFormBtn" type="submit">Lưu</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        (function () {
            const modal = document.getElementById("customerFormModal");
            const form = document.getElementById("customerForm");
            const title = document.getElementById("customerFormTitle");
            const submitBtn = document.getElementById("submitCustomerFormBtn");
            const openCreateBtn = document.getElementById("openCreateCustomerBtn");
            const closeBtn = document.getElementById("closeCustomerFormModalBtn");
            const cancelBtn = document.getElementById("cancelCustomerFormBtn");

            const nameInput = document.getElementById("customerNameInput");
            const phoneInput = document.getElementById("customerPhoneInput");
            const emailInput = document.getElementById("customerEmailInput");

            if (!modal || !form) {
                return;
            }

            const createUrl = form.dataset.createUrl;
            const updateUrlPattern = form.dataset.updateUrlPattern;

            function showModal() {
                modal.classList.remove("hidden");
                modal.classList.add("flex");
            }

            function hideModal() {
                modal.classList.add("hidden");
                modal.classList.remove("flex");
            }

            function openCreateForm() {
                title.textContent = "Thêm khách hàng mới";
                submitBtn.textContent = "Thêm mới";
                form.action = createUrl;
                form.reset();
                showModal();
            }

            function openEditForm(button) {
                const customerId = button.dataset.customerId;
                if (!customerId) {
                    return;
                }

                title.textContent = "Cập nhật khách hàng";
                submitBtn.textContent = "Lưu thay đổi";
                form.action = updateUrlPattern.replace("__id__", customerId);
                nameInput.value = button.dataset.customerName || "";
                phoneInput.value = button.dataset.customerPhone || "";
                emailInput.value = button.dataset.customerEmail || "";
                showModal();
            }

            openCreateBtn?.addEventListener("click", openCreateForm);
            closeBtn?.addEventListener("click", hideModal);
            cancelBtn?.addEventListener("click", hideModal);
            modal.addEventListener("click", function (event) {
                if (event.target === modal) {
                    hideModal();
                }
            });

            document.querySelectorAll(".open-edit-customer-btn").forEach(function (button) {
                button.addEventListener("click", function () {
                    openEditForm(button);
                });
            });
        })();
    </script>
</section>
</body>
</html>
