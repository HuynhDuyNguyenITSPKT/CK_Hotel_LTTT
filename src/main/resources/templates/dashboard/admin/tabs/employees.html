<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<section class="mt-6 rounded-xl bg-white p-4 shadow-sm space-y-4" id="section-employees" th:fragment="panel" th:if="${activeTab == 'employees'}">
    <h3 class="text-lg font-semibold">Quản lý nhân viên</h3>
    <form class="flex flex-wrap items-center gap-2" method="get" th:action="@{/admin/dashboard}">
        <input name="tab" type="hidden" value="employees">
        <input name="page" type="hidden" value="1">
        <input class="min-w-[260px] flex-1 rounded-lg border px-3 py-2" name="q" placeholder="Tìm tên / username / email / vai trò" th:value="${q}">
        <button class="rounded-lg bg-slate-900 px-4 py-2 text-white" type="submit">Lọc</button>
    </form>
    <form class="grid gap-3 md:grid-cols-5" method="post" th:action="@{/admin/employees}">
        <input class="rounded-lg border px-3 py-2" name="employeeName" placeholder="Tên nhân viên" required>
        <select class="rounded-lg border px-3 py-2" name="role" required>
            <option th:each="role : ${roles}" th:text="${role}" th:value="${role}"></option>
        </select>
        <input class="rounded-lg border px-3 py-2" name="username" placeholder="Username" required>
        <input class="rounded-lg border px-3 py-2" name="email" placeholder="Email" required type="email">
        <input class="rounded-lg border px-3 py-2" name="password" placeholder="Mật khẩu" required>
        <button class="rounded-lg bg-indigo-600 px-4 py-2 text-white md:col-span-5" type="submit">Tạo nhân viên + tài khoản</button>
    </form>
    <div class="overflow-x-auto">
        <table class="min-w-full text-sm">
            <thead><tr class="border-b text-left"><th class="p-2">Tên</th><th class="p-2">Role</th><th class="p-2">Username</th><th class="p-2">Email</th><th class="p-2">Trạng thái TK</th><th class="p-2">Chi tiết</th></tr></thead>
            <tbody>
            <tr class="border-b" th:classappend="${iter.odd} ? ' bg-slate-50'" th:each="employee,iter : ${employees}">
                <td class="p-2" th:text="${employee.employeeName}"></td>
                <td class="p-2">
                    <form class="flex items-center gap-2" method="post" th:action="@{/admin/employees/{id}/role(id=${employee.employeeId})}">
                        <select class="rounded border px-2 py-1" name="role">
                            <option th:each="role : ${roles}" th:selected="${role == employee.role}" th:text="${role}" th:value="${role}"></option>
                        </select>
                        <button class="rounded bg-slate-900 px-3 py-1 text-white" type="submit">Lưu</button>
                    </form>
                </td>
                <td class="p-2" th:text="${employee.username}"></td>
                <td class="p-2" th:text="${employee.email}"></td>
                <td class="p-2">
                    <span class="rounded-full px-2 py-1 text-xs font-semibold"
                          th:classappend="${employee.status.name() == 'ACTIVE'} ? ' bg-emerald-100 text-emerald-700' : ' bg-rose-100 text-rose-700'"
                          th:text="${employee.status}"></span>
                </td>
                <td class="p-2">
                    <button class="rounded bg-teal-600 px-3 py-1 text-xs font-semibold text-white transition hover:bg-teal-700" data-detail-section="Nhân viên" data-row-detail-btn type="button">Chi tiết</button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
    <div class="mt-4 flex items-center justify-between text-sm text-slate-600" th:if="${totalPages > 1}">
        <p th:text="'Trang ' + ${page} + ' / ' + ${totalPages} + ' - Tổng: ' + ${totalItems}"></p>
        <div class="flex gap-2">
            <a class="rounded border px-3 py-1 hover:bg-slate-100" th:href="@{/admin/dashboard(tab='employees',page=${page-1},size=${size},q=${q})}" th:if="${hasPrev}">Trước</a>
            <a class="rounded border px-3 py-1 hover:bg-slate-100" th:href="@{/admin/dashboard(tab='employees',page=${page+1},size=${size},q=${q})}" th:if="${hasNext}">Sau</a>
        </div>
    </div>
</section>
</body>
</html>
