<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<section class="hidden section-panel mt-6 rounded-xl bg-white p-4 shadow-sm space-y-4" id="section-employees" th:fragment="panel">
    <h3 class="text-lg font-semibold">Quản lý nhân viên</h3>
    <form class="grid gap-3 md:grid-cols-5" id="form-employee-create">
        <input class="rounded-lg border px-3 py-2" name="employeeName" placeholder="Tên nhân viên" required>
        <select class="rounded-lg border px-3 py-2" name="role" required>
            <option value="ADMIN">ADMIN</option><option value="MANAGER">MANAGER</option><option value="RECEPTIONIST">RECEPTIONIST</option>
        </select>
        <input class="rounded-lg border px-3 py-2" name="username" placeholder="Username" required>
        <input class="rounded-lg border px-3 py-2" name="email" placeholder="Email" required type="email">
        <input class="rounded-lg border px-3 py-2" name="password" placeholder="Mật khẩu" required>
        <button class="rounded-lg bg-indigo-600 px-4 py-2 text-white md:col-span-5" type="submit">Tạo nhân viên + tài khoản</button>
    </form>
    <div class="overflow-x-auto">
        <table class="min-w-full text-sm">
            <thead><tr class="border-b text-left"><th class="p-2">Tên</th><th class="p-2">Role</th><th class="p-2">Username</th><th class="p-2">Email</th><th class="p-2">Cập nhật</th></tr></thead>
            <tbody id="table-employees"></tbody>
        </table>
    </div>
</section>
</body>
</html>
