<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<section class="mt-6 rounded-xl bg-white p-4 shadow-sm space-y-4" id="section-rooms" th:fragment="panel" th:if="${activeTab == 'rooms'}">
    <div class="flex flex-wrap items-center justify-between gap-2">
        <h3 class="text-lg font-semibold">Quản lý phòng</h3>
        <span class="rounded-full bg-teal-100 px-3 py-1 text-xs font-semibold text-teal-700">Cloudinary image sync</span>
    </div>

    <form class="grid gap-3 rounded-2xl border border-slate-200 bg-slate-50/80 p-4 md:grid-cols-5" enctype="multipart/form-data" method="post" th:action="@{/admin/rooms}">
        <input class="rounded-lg border border-slate-300 bg-white px-3 py-2" name="soPhong" placeholder="Số phòng" required>
        <select class="rounded-lg border border-slate-300 bg-white px-3 py-2" name="trangThai" required>
            <option th:each="status : ${roomStatuses}" th:text="${status}" th:value="${status}"></option>
        </select>
        <select class="rounded-lg border border-slate-300 bg-white px-3 py-2" name="loaiPhongId" required>
            <option value="">Chọn loại phòng</option>
            <option th:each="roomType : ${roomTypes}" th:text="${roomType.tenLoai}" th:value="${roomType.id}"></option>
        </select>
        <input accept="image/*" class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm file:mr-3 file:rounded-md file:border-0 file:bg-teal-600 file:px-3 file:py-1.5 file:font-semibold file:text-white hover:file:bg-teal-700" name="imageFile" type="file">
        <button class="rounded-lg bg-teal-600 px-4 py-2 font-semibold text-white transition hover:bg-teal-700 md:col-span-5" type="submit">Thêm phòng</button>
    </form>

    <div class="overflow-x-auto rounded-2xl border border-slate-200">
        <table class="min-w-full text-sm">
            <thead class="bg-slate-50">
            <tr class="border-b text-left text-slate-700">
                <th class="p-2">Số phòng</th>
                <th class="p-2">Loại phòng</th>
                <th class="p-2">Trạng thái</th>
                <th class="p-2">Ảnh</th>
                <th class="p-2">Chi tiết</th>
                <th class="p-2">Cập nhật</th>
                <th class="p-2">Xóa</th>
            </tr>
            </thead>
            <tbody>
            <tr class="border-b" th:classappend="${iter.odd} ? ' bg-slate-50'" th:each="room,iter : ${rooms}">
                <td class="p-2" th:text="${room.soPhong}"></td>
                <td class="p-2" th:text="${room.tenLoaiPhong}"></td>
                <td class="p-2">
                    <span class="rounded-full px-2 py-1 text-xs font-semibold"
                          th:classappend="${room.trangThai.name() == 'AVAILABLE'} ? ' bg-emerald-100 text-emerald-700' : (${room.trangThai.name() == 'OCCUPIED'} ? ' bg-indigo-100 text-indigo-700' : ' bg-amber-100 text-amber-700')"
                          th:text="${room.trangThai}"></span>
                </td>
                <td class="p-2">
                    <div class="flex items-center gap-2">
                        <img class="h-12 w-16 rounded-lg object-cover ring-1 ring-slate-200" th:if="${room.imageUrl}" th:src="${room.imageUrl}" alt="room image">
                        <span class="text-xs text-slate-400" th:if="${room.imageUrl == null}">Chưa có ảnh</span>
                    </div>
                </td>
                <td class="p-2">
                    <button class="rounded bg-teal-600 px-3 py-1 text-xs font-semibold text-white transition hover:bg-teal-700" data-detail-section="Phòng" data-row-detail-btn type="button">Chi tiết</button>
                </td>
                <td class="p-2">
                    <form class="grid gap-2 md:grid-cols-5" enctype="multipart/form-data" method="post" th:action="@{/admin/rooms/{id}/update(id=${room.id})}">
                        <input class="rounded border border-slate-300 px-2 py-1" name="soPhong" required th:value="${room.soPhong}">
                        <select class="rounded border border-slate-300 px-2 py-1" name="trangThai" required>
                            <option th:each="status : ${roomStatuses}" th:selected="${status == room.trangThai}" th:text="${status}" th:value="${status}"></option>
                        </select>
                        <select class="rounded border border-slate-300 px-2 py-1" name="loaiPhongId" required>
                            <option th:each="roomType : ${roomTypes}" th:selected="${roomType.id == room.loaiPhongId}" th:text="${roomType.tenLoai}" th:value="${roomType.id}"></option>
                        </select>
                        <input accept="image/*" class="rounded border border-slate-300 px-2 py-1 text-xs" name="imageFile" type="file">
                        <input name="imageUrl" th:value="${room.imageUrl}" type="hidden">
                        <button class="rounded bg-amber-500 px-3 py-1 font-semibold text-white transition hover:bg-amber-600" type="submit">Lưu</button>
                    </form>
                </td>
                <td class="p-2">
                    <form method="post" th:action="@{/admin/rooms/{id}/delete(id=${room.id})}">
                        <button class="rounded bg-rose-600 px-3 py-1 font-semibold text-white transition hover:bg-rose-700" type="submit">Xóa</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
    <div class="mt-4 flex items-center justify-between text-sm text-slate-600" th:if="${totalPages > 1}">
        <p th:text="'Trang ' + ${page} + ' / ' + ${totalPages} + ' - Tổng: ' + ${totalItems}"></p>
        <div class="flex gap-2">
            <a class="rounded border px-3 py-1 hover:bg-slate-100" th:href="@{/admin/dashboard(tab='rooms',page=${page-1},size=${size})}" th:if="${hasPrev}">Trước</a>
            <a class="rounded border px-3 py-1 hover:bg-slate-100" th:href="@{/admin/dashboard(tab='rooms',page=${page+1},size=${size})}" th:if="${hasNext}">Sau</a>
        </div>
    </div>
</section>
</body>
</html>
