<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<section class="hidden section-panel mt-6 rounded-xl bg-white p-4 shadow-sm space-y-4" id="section-rooms" th:fragment="panel">
    <h3 class="text-lg font-semibold">Quản lý phòng</h3>
    <form class="grid gap-3 md:grid-cols-4" id="form-room-create">
        <input class="rounded-lg border px-3 py-2" name="soPhong" placeholder="Số phòng" required>
        <select class="rounded-lg border px-3 py-2" name="trangThai" required>
            <option value="AVAILABLE">AVAILABLE</option><option value="OCCUPIED">OCCUPIED</option><option value="MAINTENANCE">MAINTENANCE</option><option value="CLEANING">CLEANING</option>
        </select>
        <input class="rounded-lg border px-3 py-2" name="loaiPhongId" placeholder="ID loại phòng" required type="number">
        <input class="rounded-lg border px-3 py-2" name="imageUrl" placeholder="Image URL">
        <button class="rounded-lg bg-indigo-600 px-4 py-2 text-white md:col-span-4" type="submit">Thêm phòng</button>
    </form>
    <div class="overflow-x-auto"><table class="min-w-full text-sm"><thead><tr class="border-b text-left"><th class="p-2">Số phòng</th><th class="p-2">Loại</th><th class="p-2">Trạng thái</th><th class="p-2">Thao tác</th></tr></thead><tbody id="table-rooms"></tbody></table></div>
</section>
</body>
</html>
