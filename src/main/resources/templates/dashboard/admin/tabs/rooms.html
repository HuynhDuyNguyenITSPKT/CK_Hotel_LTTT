<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<section class="mt-6 space-y-4" id="section-rooms" th:fragment="panel" th:if="${activeTab == 'rooms'}">
    <div class="rounded-xl border border-slate-200 bg-white shadow-sm overflow-hidden">
        <div class="flex flex-wrap items-center justify-between gap-3 border-b border-slate-200 bg-slate-50/70 px-5 py-4">
            <div>
                <h3 class="text-lg font-semibold text-slate-800">Quản lý phòng</h3>
                <p class="text-xs text-slate-500">Đồng bộ giao diện thao tác phòng theo phong cách thống nhất.</p>
            </div>
            <span class="inline-flex items-center gap-1.5 rounded-full border border-teal-100 bg-teal-50 px-2.5 py-1 text-xs font-semibold text-teal-700">
                <i class="fa-solid fa-image text-[10px]"></i>
                Cloudinary image sync
            </span>
        </div>

        <div class="px-5 py-4">
            <div class="flex flex-wrap items-center justify-between gap-3">
                <form class="grid min-w-[300px] flex-1 gap-2 md:grid-cols-[1fr_220px_100px]" method="get" th:action="@{/admin/dashboard}">
                    <input name="tab" type="hidden" value="rooms">
                    <input name="page" type="hidden" value="1">
                    <input class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm" name="q" placeholder="Tìm số phòng / loại phòng / trạng thái" th:value="${q}">
                    <select class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm" name="roomStatus">
                        <option th:selected="${roomStatusFilter == null}" value="">Tất cả trạng thái</option>
                        <option th:each="status : ${roomStatuses}" th:selected="${roomStatusFilter == status}" th:text="${status}" th:value="${status}"></option>
                    </select>
                    <button class="rounded-lg bg-slate-900 px-4 py-2 text-sm font-semibold text-white transition hover:bg-slate-800" type="submit">Lọc</button>
                </form>
                <button class="inline-flex items-center gap-2 rounded-lg bg-blue-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-blue-700" id="openCreateRoomBtn" type="button">
                    <i class="fa-solid fa-plus"></i>
                    Thêm phòng
                </button>
            </div>
        </div>
    </div>

    <div class="rounded-xl border border-slate-200 bg-white shadow-sm overflow-hidden">
        <div class="flex flex-wrap items-center justify-between gap-3 border-b border-slate-200 px-5 py-4">
            <h4 class="text-base font-semibold text-slate-800">Danh sách phòng</h4>
            <span class="text-xs text-slate-500" th:text="'Tổng: ' + ${totalItems}"></span>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full border-collapse text-sm">
                <thead>
                <tr class="border-b border-slate-200 bg-slate-50 text-left text-xs uppercase tracking-wider text-slate-500">
                    <th class="px-5 py-3.5 font-semibold">Số phòng</th>
                    <th class="px-5 py-3.5 font-semibold">Loại phòng</th>
                    <th class="px-5 py-3.5 font-semibold">Trạng thái</th>
                    <th class="px-5 py-3.5 font-semibold">Ảnh</th>
                    <th class="px-5 py-3.5 text-center font-semibold">Chi tiết</th>
                    <th class="px-5 py-3.5 text-right font-semibold">Thao tác</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                <tr class="transition-colors hover:bg-slate-50/70" th:each="room : ${rooms}">
                    <td class="px-5 py-4 font-semibold text-slate-800" th:text="${room.soPhong}"></td>
                    <td class="px-5 py-4 text-slate-700" th:text="${room.tenLoaiPhong}"></td>
                    <td class="px-5 py-4">
                        <span class="rounded-full px-2 py-1 text-xs font-semibold"
                              th:classappend="${room.trangThai.name() == 'AVAILABLE'} ? ' bg-emerald-100 text-emerald-700' : (${room.trangThai.name() == 'OCCUPIED'} ? ' bg-indigo-100 text-indigo-700' : ' bg-amber-100 text-amber-700')"
                              th:text="${room.trangThai}"></span>
                    </td>
                    <td class="px-5 py-4">
                        <div class="h-12 w-16 overflow-hidden rounded-md border border-slate-200 bg-slate-100">
                            <img alt="room image" class="h-full w-full object-cover" th:if="${room.imageUrl}" th:src="${room.imageUrl}">
                            <div class="flex h-full w-full items-center justify-center text-slate-400" th:if="${room.imageUrl == null}">
                                <i class="fa-regular fa-image"></i>
                            </div>
                        </div>
                    </td>
                    <td class="px-5 py-4 text-center">
                        <button class="rounded-md border border-teal-200 bg-teal-50 px-3 py-1.5 text-xs font-semibold text-teal-700 transition hover:bg-teal-100" data-detail-section="Phòng" data-row-detail-btn type="button">
                            Xem chi tiết
                        </button>
                    </td>
                    <td class="px-5 py-4 text-right">
                        <div class="flex items-center justify-end gap-2">
                            <button class="open-edit-room-btn rounded-md p-2 text-slate-400 transition hover:bg-blue-50 hover:text-blue-600"
                                    th:attr="data-room-id=${room.id},data-room-number=${room.soPhong},data-room-status=${room.trangThai},data-room-type-id=${room.loaiPhongId},data-room-image-url=${room.imageUrl},data-update-url=@{/admin/rooms/{id}/update(id=${room.id})}"
                                    title="Chỉnh sửa"
                                    type="button">
                                <i class="fa-solid fa-pen"></i>
                            </button>
                            <form method="post" th:action="@{/admin/rooms/{id}/delete(id=${room.id})}">
                                <button class="rounded-md p-2 text-slate-400 transition hover:bg-rose-50 hover:text-rose-600" title="Xóa" type="submit">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="mt-4 flex items-center justify-between text-sm text-slate-600" th:if="${totalPages > 1}">
        <p th:text="'Trang ' + ${page} + ' / ' + ${totalPages} + ' - Tổng: ' + ${totalItems}"></p>
        <div class="flex gap-2">
            <a class="rounded border px-3 py-1 hover:bg-slate-100" th:href="@{/admin/dashboard(tab='rooms',page=${page-1},size=${size},q=${q},roomStatus=${roomStatusFilter})}" th:if="${hasPrev}">Trước</a>
            <a class="rounded border px-3 py-1 hover:bg-slate-100" th:href="@{/admin/dashboard(tab='rooms',page=${page+1},size=${size},q=${q},roomStatus=${roomStatusFilter})}" th:if="${hasNext}">Sau</a>
        </div>
    </div>

    <div class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-900/55 p-4" id="roomFormModal">
        <div class="w-full max-w-2xl rounded-2xl bg-white shadow-2xl ring-1 ring-slate-200">
            <div class="flex items-center justify-between border-b border-slate-200 px-5 py-4">
                <h3 class="text-lg font-bold text-slate-800" id="roomFormTitle">Thêm phòng</h3>
                <button class="rounded-lg px-2 py-1 text-slate-500 transition hover:bg-slate-100 hover:text-slate-700" id="closeRoomFormModalBtn" type="button">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <form class="grid gap-3 px-5 py-4 md:grid-cols-2" data-update-url-pattern="/admin/rooms/__id__/update" enctype="multipart/form-data" id="roomForm" method="post"
                th:attr="data-create-url=@{/admin/rooms}">
                <div class="md:col-span-2">
                    <label class="mb-1 block text-sm font-medium text-slate-700" for="roomSoPhongInput">Số phòng</label>
                    <input class="w-full rounded-lg border border-slate-300 px-3 py-2" id="roomSoPhongInput" name="soPhong" required>
                </div>
                <div>
                    <label class="mb-1 block text-sm font-medium text-slate-700" for="roomStatusInput">Trạng thái</label>
                    <select class="w-full rounded-lg border border-slate-300 px-3 py-2" id="roomStatusInput" name="trangThai" required>
                        <option th:each="status : ${roomStatuses}" th:text="${status}" th:value="${status}"></option>
                    </select>
                </div>
                <div>
                    <label class="mb-1 block text-sm font-medium text-slate-700" for="roomTypeInput">Loại phòng</label>
                    <select class="w-full rounded-lg border border-slate-300 px-3 py-2" id="roomTypeInput" name="loaiPhongId" required>
                        <option value="">Chọn loại phòng</option>
                        <option th:each="roomType : ${roomTypes}" th:text="${roomType.tenLoai}" th:value="${roomType.id}"></option>
                    </select>
                </div>
                <div class="md:col-span-2">
                    <label class="mb-1 block text-sm font-medium text-slate-700" for="roomImageInput">Ảnh phòng</label>
                    <input accept="image/*" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm file:mr-3 file:rounded-md file:border-0 file:bg-teal-600 file:px-3 file:py-1.5 file:font-semibold file:text-white hover:file:bg-teal-700" id="roomImageInput" name="imageFile" type="file">
                </div>
                <input id="roomImageUrlInput" name="imageUrl" type="hidden">
                <div class="md:col-span-2 flex justify-end gap-2 border-t border-slate-200 pt-3">
                    <button class="rounded-lg border border-slate-300 px-4 py-2 font-semibold text-slate-700 transition hover:bg-slate-100" id="cancelRoomFormBtn" type="button">Hủy</button>
                    <button class="rounded-lg bg-teal-600 px-4 py-2 font-semibold text-white transition hover:bg-teal-700" id="submitRoomFormBtn" type="submit">Lưu</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        (function () {
            const modal = document.getElementById("roomFormModal");
            const title = document.getElementById("roomFormTitle");
            const form = document.getElementById("roomForm");
            const submitBtn = document.getElementById("submitRoomFormBtn");
            const openCreateBtn = document.getElementById("openCreateRoomBtn");
            const closeBtn = document.getElementById("closeRoomFormModalBtn");
            const cancelBtn = document.getElementById("cancelRoomFormBtn");
            const soPhongInput = document.getElementById("roomSoPhongInput");
            const statusInput = document.getElementById("roomStatusInput");
            const roomTypeInput = document.getElementById("roomTypeInput");
            const imageInput = document.getElementById("roomImageInput");
            const imageUrlInput = document.getElementById("roomImageUrlInput");

            if (!modal || !form) {
                return;
            }

            const createUrl = form.dataset.createUrl;
            const updateUrlPattern = form.dataset.updateUrlPattern;

            function showModal() {
                modal.classList.remove("hidden");
                modal.classList.add("flex");
            }

            function hideModal() {
                modal.classList.add("hidden");
                modal.classList.remove("flex");
            }

            function normalizeImageUrl(value) {
                if (!value) {
                    return "";
                }
                const normalized = value.trim();
                if (normalized === "null" || normalized === "undefined") {
                    return "";
                }
                return normalized;
            }

            function openCreateForm() {
                title.textContent = "Thêm phòng";
                submitBtn.textContent = "Thêm phòng";
                form.action = createUrl;
                form.reset();
                imageUrlInput.value = "";
                showModal();
            }

            function openEditForm(button) {
                const roomId = button.dataset.roomId;
                if (!roomId) {
                    return;
                }

                title.textContent = "Cập nhật phòng";
                submitBtn.textContent = "Lưu thay đổi";
                form.action = button.dataset.updateUrl || updateUrlPattern.replace("__id__", roomId);
                soPhongInput.value = button.dataset.roomNumber || "";
                statusInput.value = button.dataset.roomStatus || "";
                roomTypeInput.value = button.dataset.roomTypeId || "";
                imageUrlInput.value = normalizeImageUrl(button.dataset.roomImageUrl);
                imageInput.value = "";
                showModal();
            }

            openCreateBtn?.addEventListener("click", openCreateForm);
            closeBtn?.addEventListener("click", hideModal);
            cancelBtn?.addEventListener("click", hideModal);
            modal.addEventListener("click", function (event) {
                if (event.target === modal) {
                    hideModal();
                }
            });

            document.querySelectorAll(".open-edit-room-btn").forEach(function (button) {
                button.addEventListener("click", function () {
                    openEditForm(button);
                });
            });
        })();
    </script>
</section>
</body>
</html>
