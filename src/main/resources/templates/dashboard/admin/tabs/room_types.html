<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<section class="mt-6 space-y-4" id="section-room-types" th:fragment="panel" th:if="${activeTab == 'room-types'}">
    <div class="rounded-xl border border-slate-200 bg-white shadow-sm overflow-hidden">
        <div class="flex flex-wrap items-center justify-between gap-3 border-b border-slate-200 bg-slate-50/70 px-5 py-4">
            <div>
                <h3 class="text-lg font-semibold text-slate-800">Quản lý loại phòng</h3>
                <p class="text-xs text-slate-500">Thiết kế theo phong cách dashboard hiện đại, dễ thao tác.</p>
            </div>
            <span class="inline-flex items-center gap-1.5 rounded-full border border-blue-100 bg-blue-50 px-2.5 py-1 text-xs font-semibold text-blue-700">
                <i class="fa-solid fa-image text-[10px]"></i>
                Cloudinary image sync
            </span>
        </div>

        <div class="px-5 py-4">
            <div class="flex flex-wrap items-center justify-between gap-3">
                <form class="flex min-w-[260px] flex-1 flex-wrap items-center gap-2" method="get" th:action="@{/admin/dashboard}">
                    <input name="tab" type="hidden" value="room-types">
                    <input name="page" type="hidden" value="1">
                    <input class="min-w-[240px] flex-1 rounded-lg border border-slate-300 px-3 py-2 text-sm" name="q" placeholder="Tìm tên loại / mô tả" th:value="${q}">
                    <button class="rounded-lg bg-slate-900 px-4 py-2 text-sm font-semibold text-white transition hover:bg-slate-800" type="submit">Lọc</button>
                </form>
                <button class="inline-flex items-center gap-2 rounded-lg bg-blue-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-blue-700" id="openCreateRoomTypeBtn" type="button">
                    <i class="fa-solid fa-plus"></i>
                    Thêm loại phòng
                </button>
            </div>
        </div>
    </div>

    <div class="rounded-xl border border-slate-200 bg-white shadow-sm overflow-hidden">
        <div class="flex flex-wrap items-center justify-between gap-3 border-b border-slate-200 px-5 py-4">
            <h4 class="text-base font-semibold text-slate-800">Danh sách loại phòng</h4>
            <span class="text-xs text-slate-500" th:text="'Tổng: ' + ${totalItems}"></span>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full border-collapse text-sm">
                <thead>
                <tr class="border-b border-slate-200 bg-slate-50 text-left text-xs uppercase tracking-wider text-slate-500">
                    <th class="px-5 py-3.5 font-semibold">Tên loại</th>
                    <th class="px-5 py-3.5 font-semibold">Giá cơ bản</th>
                    <th class="px-5 py-3.5 font-semibold">Mô tả</th>
                    <th class="px-5 py-3.5 font-semibold">Hình ảnh</th>
                    <th class="px-5 py-3.5 text-center font-semibold">Chi tiết</th>
                    <th class="px-5 py-3.5 text-right font-semibold">Thao tác</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                <tr class="transition-colors hover:bg-slate-50/70" th:each="roomType : ${roomTypes}">
                    <td class="px-5 py-4">
                        <span class="font-semibold text-slate-800" th:text="${roomType.tenLoai}"></span>
                    </td>
                    <td class="px-5 py-4 text-slate-700">
                        <div class="font-semibold" th:text="${#numbers.formatDecimal(roomType.giaCoBan, 0, 'COMMA', 0, 'POINT')}"></div>
                        <div class="text-xs text-slate-500">VND / đêm</div>
                    </td>
                    <td class="max-w-[320px] px-5 py-4 text-sm text-slate-600">
                        <span th:text="${(roomType.moTa != null and !#strings.isEmpty(roomType.moTa)) ? roomType.moTa : 'Không có mô tả'}"></span>
                    </td>
                    <td class="px-5 py-4">
                        <div class="h-12 w-16 overflow-hidden rounded-md border border-slate-200 bg-slate-100">
                            <img alt="room type image" class="h-full w-full object-cover" th:if="${roomType.imageUrl}" th:src="${roomType.imageUrl}">
                            <div class="flex h-full w-full items-center justify-center text-slate-400" th:if="${roomType.imageUrl == null}">
                                <i class="fa-regular fa-image"></i>
                            </div>
                        </div>
                    </td>
                    <td class="px-5 py-4 text-center">
                        <button class="rounded-md border border-teal-200 bg-teal-50 px-3 py-1.5 text-xs font-semibold text-teal-700 transition hover:bg-teal-100" data-detail-section="Loại phòng" data-row-detail-btn type="button">
                            Xem chi tiết
                        </button>
                    </td>
                    <td class="px-5 py-4 text-right">
                        <div class="flex items-center justify-end gap-2">
                            <button class="open-edit-room-type-btn rounded-md p-2 text-slate-400 transition hover:bg-blue-50 hover:text-blue-600"
                                    th:attr="data-room-type-id=${roomType.id},data-room-type-name=${roomType.tenLoai},data-room-type-price=${roomType.giaCoBan},data-room-type-desc=${roomType.moTa},data-room-type-image-url=${roomType.imageUrl},data-update-url=@{/admin/room-types/{id}/update(id=${roomType.id})}"
                                    title="Chỉnh sửa"
                                    type="button">
                                <i class="fa-solid fa-pen"></i>
                            </button>
                            <form method="post" th:action="@{/admin/room-types/{id}/delete(id=${roomType.id})}">
                                <button class="rounded-md p-2 text-slate-400 transition hover:bg-rose-50 hover:text-rose-600" title="Xóa" type="submit">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="mt-4 flex items-center justify-between text-sm text-slate-600" th:if="${totalPages > 1}">
        <p th:text="'Trang ' + ${page} + ' / ' + ${totalPages} + ' - Tổng: ' + ${totalItems}"></p>
        <div class="flex gap-2">
            <a class="rounded border px-3 py-1 hover:bg-slate-100" th:href="@{/admin/dashboard(tab='room-types',page=${page-1},size=${size},q=${q})}" th:if="${hasPrev}">Trước</a>
            <a class="rounded border px-3 py-1 hover:bg-slate-100" th:href="@{/admin/dashboard(tab='room-types',page=${page+1},size=${size},q=${q})}" th:if="${hasNext}">Sau</a>
        </div>
    </div>

    <div class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-900/55 p-4" id="roomTypeFormModal">
        <div class="w-full max-w-2xl rounded-2xl bg-white shadow-2xl ring-1 ring-slate-200">
            <div class="flex items-center justify-between border-b border-slate-200 px-5 py-4">
                <h3 class="text-lg font-bold text-slate-800" id="roomTypeFormTitle">Thêm loại phòng mới</h3>
                <button class="rounded-lg px-2 py-1 text-slate-500 transition hover:bg-slate-100 hover:text-slate-700" id="closeRoomTypeFormModalBtn" type="button">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <form class="grid gap-3 px-5 py-4 md:grid-cols-2" enctype="multipart/form-data" id="roomTypeForm" method="post"
                  th:attr="data-create-url=@{/admin/room-types},data-update-url-pattern=@{/admin/room-types/{id}/update(id='__id__')}">
                <div>
                    <label class="mb-1 block text-sm font-medium text-slate-700" for="roomTypeNameInput">Tên loại phòng</label>
                    <input class="w-full rounded-lg border border-slate-300 px-3 py-2" id="roomTypeNameInput" name="tenLoai" required>
                </div>
                <div>
                    <label class="mb-1 block text-sm font-medium text-slate-700" for="roomTypePriceInput">Giá cơ bản (VND)</label>
                    <input class="w-full rounded-lg border border-slate-300 px-3 py-2" id="roomTypePriceInput" name="giaCoBan" required step="0.01" type="number">
                </div>
                <div class="md:col-span-2">
                    <label class="mb-1 block text-sm font-medium text-slate-700" for="roomTypeDescInput">Mô tả</label>
                    <input class="w-full rounded-lg border border-slate-300 px-3 py-2" id="roomTypeDescInput" name="moTa">
                </div>
                <div class="md:col-span-2">
                    <label class="mb-1 block text-sm font-medium text-slate-700" for="roomTypeImageInput">Hình ảnh</label>
                    <input accept="image/*" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm file:mr-3 file:rounded-md file:border-0 file:bg-blue-600 file:px-3 file:py-1.5 file:font-semibold file:text-white hover:file:bg-blue-700" id="roomTypeImageInput" name="imageFile" type="file">
                </div>

                <input id="roomTypeImageUrlInput" name="imageUrl" type="hidden">

                <div class="md:col-span-2 flex justify-end gap-2 border-t border-slate-200 pt-3">
                    <button class="rounded-lg border border-slate-300 px-4 py-2 font-semibold text-slate-700 transition hover:bg-slate-100" id="cancelRoomTypeFormBtn" type="button">Hủy</button>
                    <button class="rounded-lg bg-blue-600 px-4 py-2 font-semibold text-white transition hover:bg-blue-700" id="submitRoomTypeFormBtn" type="submit">Lưu</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        (function () {
            const modal = document.getElementById("roomTypeFormModal");
            const form = document.getElementById("roomTypeForm");
            const title = document.getElementById("roomTypeFormTitle");
            const submitBtn = document.getElementById("submitRoomTypeFormBtn");
            const openCreateBtn = document.getElementById("openCreateRoomTypeBtn");
            const closeBtn = document.getElementById("closeRoomTypeFormModalBtn");
            const cancelBtn = document.getElementById("cancelRoomTypeFormBtn");

            const nameInput = document.getElementById("roomTypeNameInput");
            const priceInput = document.getElementById("roomTypePriceInput");
            const descInput = document.getElementById("roomTypeDescInput");
            const imageInput = document.getElementById("roomTypeImageInput");
            const imageUrlInput = document.getElementById("roomTypeImageUrlInput");

            if (!modal || !form) {
                return;
            }

            const createUrl = form.dataset.createUrl;
            const updateUrlPattern = form.dataset.updateUrlPattern;

            function showModal() {
                modal.classList.remove("hidden");
                modal.classList.add("flex");
            }

            function hideModal() {
                modal.classList.add("hidden");
                modal.classList.remove("flex");
            }

            function normalizeImageUrl(value) {
                if (!value) {
                    return "";
                }
                const normalized = value.trim();
                if (normalized === "null" || normalized === "undefined") {
                    return "";
                }
                return normalized;
            }

            function openCreateForm() {
                title.textContent = "Thêm loại phòng mới";
                submitBtn.textContent = "Thêm mới";
                form.action = createUrl;
                form.reset();
                imageUrlInput.value = "";
                showModal();
            }

            function openEditForm(button) {
                const roomTypeId = button.dataset.roomTypeId;
                if (!roomTypeId) {
                    return;
                }

                title.textContent = "Cập nhật loại phòng";
                submitBtn.textContent = "Lưu thay đổi";
                form.action = button.dataset.updateUrl || updateUrlPattern.replace("__id__", roomTypeId);
                nameInput.value = button.dataset.roomTypeName || "";
                priceInput.value = button.dataset.roomTypePrice || "";
                descInput.value = button.dataset.roomTypeDesc || "";
                imageUrlInput.value = normalizeImageUrl(button.dataset.roomTypeImageUrl);
                imageInput.value = "";
                showModal();
            }

            openCreateBtn?.addEventListener("click", openCreateForm);
            closeBtn?.addEventListener("click", hideModal);
            cancelBtn?.addEventListener("click", hideModal);

            modal.addEventListener("click", function (event) {
                if (event.target === modal) {
                    hideModal();
                }
            });

            document.querySelectorAll(".open-edit-room-type-btn").forEach(function (button) {
                button.addEventListener("click", function () {
                    openEditForm(button);
                });
            });
        })();
    </script>
</section>
</body>
</html>
