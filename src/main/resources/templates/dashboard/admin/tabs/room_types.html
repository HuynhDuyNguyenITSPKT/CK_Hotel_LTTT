<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<section class="mt-6 rounded-xl bg-white p-4 shadow-sm space-y-4" id="section-room-types" th:fragment="panel" th:if="${activeTab == 'room-types'}">
    <div class="flex flex-wrap items-center justify-between gap-2">
        <h3 class="text-lg font-semibold">Quản lý loại phòng</h3>
        <span class="rounded-full bg-cyan-100 px-3 py-1 text-xs font-semibold text-cyan-700">Cloudinary image sync</span>
    </div>

    <form class="grid gap-3 rounded-2xl border border-slate-200 bg-slate-50/80 p-4 md:grid-cols-5" enctype="multipart/form-data" method="post" th:action="@{/admin/room-types}">
        <input class="rounded-lg border border-slate-300 bg-white px-3 py-2" name="tenLoai" placeholder="Tên loại phòng" required>
        <input class="rounded-lg border border-slate-300 bg-white px-3 py-2" name="giaCoBan" placeholder="Giá cơ bản" required step="0.01" type="number">
        <input class="rounded-lg border border-slate-300 bg-white px-3 py-2" name="moTa" placeholder="Mô tả (không bắt buộc)">
        <input accept="image/*" class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm file:mr-3 file:rounded-md file:border-0 file:bg-cyan-600 file:px-3 file:py-1.5 file:font-semibold file:text-white hover:file:bg-cyan-700" name="imageFile" type="file">
        <button class="rounded-lg bg-cyan-600 px-4 py-2 font-semibold text-white transition hover:bg-cyan-700" type="submit">Thêm loại phòng</button>
    </form>

    <div class="overflow-x-auto rounded-2xl border border-slate-200">
        <table class="min-w-full text-sm">
            <thead class="bg-slate-50">
            <tr class="border-b text-left text-slate-700">
                <th class="p-2">Tên loại</th>
                <th class="p-2">Giá cơ bản</th>
                <th class="p-2">Mô tả</th>
                <th class="p-2">Ảnh</th>
                <th class="p-2">Chi tiết</th>
                <th class="p-2">Cập nhật</th>
                <th class="p-2">Xóa</th>
            </tr>
            </thead>
            <tbody>
            <tr class="border-b" th:classappend="${iter.odd} ? ' bg-slate-50'" th:each="roomType,iter : ${roomTypes}">
                <td class="p-2 font-medium text-slate-800" th:text="${roomType.tenLoai}"></td>
                <td class="p-2" th:text="${#numbers.formatDecimal(roomType.giaCoBan, 0, 'COMMA', 0, 'POINT')} + ' VND'"></td>
                <td class="p-2 text-slate-600" th:text="${(roomType.moTa != null and !#strings.isEmpty(roomType.moTa)) ? roomType.moTa : 'Không có mô tả'}"></td>
                <td class="p-2">
                    <div class="flex items-center gap-2">
                        <img class="h-12 w-16 rounded-lg object-cover ring-1 ring-slate-200" th:if="${roomType.imageUrl}" th:src="${roomType.imageUrl}" alt="room type image">
                        <span class="text-xs text-slate-400" th:if="${roomType.imageUrl == null}">Chưa có ảnh</span>
                    </div>
                </td>
                <td class="p-2">
                    <button class="rounded bg-teal-600 px-3 py-1 text-xs font-semibold text-white transition hover:bg-teal-700" data-detail-section="Loại phòng" data-row-detail-btn type="button">Chi tiết</button>
                </td>
                <td class="p-2">
                    <form class="grid gap-2 md:grid-cols-5" enctype="multipart/form-data" method="post" th:action="@{/admin/room-types/{id}/update(id=${roomType.id})}">
                        <input class="rounded border border-slate-300 px-2 py-1" name="tenLoai" required th:value="${roomType.tenLoai}">
                        <input class="rounded border border-slate-300 px-2 py-1" name="giaCoBan" required step="0.01" th:value="${roomType.giaCoBan}" type="number">
                        <input class="rounded border border-slate-300 px-2 py-1" name="moTa" th:value="${roomType.moTa}">
                        <input accept="image/*" class="rounded border border-slate-300 px-2 py-1 text-xs" name="imageFile" type="file">
                        <input name="imageUrl" th:value="${roomType.imageUrl}" type="hidden">
                        <button class="rounded bg-amber-500 px-3 py-1 font-semibold text-white transition hover:bg-amber-600 md:col-span-5" type="submit">Lưu</button>
                    </form>
                </td>
                <td class="p-2">
                    <form method="post" th:action="@{/admin/room-types/{id}/delete(id=${roomType.id})}">
                        <button class="rounded bg-rose-600 px-3 py-1 font-semibold text-white transition hover:bg-rose-700" type="submit">Xóa</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
    <div class="mt-4 flex items-center justify-between text-sm text-slate-600" th:if="${totalPages > 1}">
        <p th:text="'Trang ' + ${page} + ' / ' + ${totalPages} + ' - Tổng: ' + ${totalItems}"></p>
        <div class="flex gap-2">
            <a class="rounded border px-3 py-1 hover:bg-slate-100" th:href="@{/admin/dashboard(tab='room-types',page=${page-1},size=${size})}" th:if="${hasPrev}">Trước</a>
            <a class="rounded border px-3 py-1 hover:bg-slate-100" th:href="@{/admin/dashboard(tab='room-types',page=${page+1},size=${size})}" th:if="${hasNext}">Sau</a>
        </div>
    </div>
</section>
</body>
</html>
