<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<section class="space-y-6" id="section-dashboard" th:fragment="panel" th:if="${activeTab == 'dashboard'}">
    <div class="flex flex-wrap items-center justify-between gap-2">
        <h2 class="text-2xl font-bold">Dashboard quản trị</h2>
        <span class="rounded-full bg-teal-100 px-3 py-1 text-xs font-semibold text-teal-700">Báo cáo thời gian thực</span>
    </div>

    <div class="grid gap-4 sm:grid-cols-2 xl:grid-cols-4">
        <div class="rounded-2xl bg-gradient-to-r from-teal-600 to-cyan-600 p-4 text-white shadow-sm"><p class="text-sm text-teal-100">Doanh thu</p><p class="text-2xl font-bold" th:text="${#numbers.formatDecimal(stats.tongDoanhThu, 0, 'COMMA', 0, 'POINT')} + ' VND'"></p></div>
        <div class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm"><p class="text-sm text-slate-500">Hóa đơn</p><p class="text-2xl font-bold" th:text="${stats.totalHoaDon}"></p></div>
        <div class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm"><p class="text-sm text-slate-500">Khách hàng</p><p class="text-2xl font-bold" th:text="${stats.totalKhachHang}"></p></div>
        <div class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm"><p class="text-sm text-slate-500">Phòng</p><p class="text-2xl font-bold" th:text="${stats.totalPhong}"></p></div>
    </div>

    <section class="rounded-2xl bg-white p-5 shadow-sm">
        <h3 class="mb-4 text-lg font-semibold">Biểu đồ doanh thu theo tháng</h3>
        <canvas height="120" id="revenueChart"></canvas>
    </section>

    <section class="rounded-2xl bg-white p-5 shadow-sm">
        <form class="flex flex-wrap items-end gap-3" method="get" th:action="@{/admin/dashboard}">
            <input name="tab" type="hidden" value="dashboard">
            <div>
                <label class="mb-1 block text-xs font-semibold uppercase text-slate-500" for="report-day">Ngày</label>
                <input class="rounded-lg border px-3 py-2 text-sm" id="report-day" max="31" min="1" name="day" placeholder="VD: 26" th:value="${filterDay}" type="number">
            </div>
            <div>
                <label class="mb-1 block text-xs font-semibold uppercase text-slate-500" for="report-month">Tháng</label>
                <input class="rounded-lg border px-3 py-2 text-sm" id="report-month" max="12" min="1" name="month" placeholder="VD: 3" th:value="${filterMonth}" type="number">
            </div>
            <div>
                <label class="mb-1 block text-xs font-semibold uppercase text-slate-500" for="report-year">Năm</label>
                <input class="rounded-lg border px-3 py-2 text-sm" id="report-year" min="2000" name="year" placeholder="VD: 2026" th:value="${filterYear}" type="number">
            </div>
            <button class="rounded-lg bg-teal-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-teal-700" type="submit">Áp dụng lọc</button>
            <a class="rounded-lg border px-4 py-2 text-sm font-semibold" th:href="@{/admin/dashboard(tab='dashboard')}">Xóa lọc</a>
        </form>
    </section>

    <div class="grid gap-4 xl:grid-cols-2">
        <section class="rounded-2xl bg-white p-5 shadow-sm">
            <div class="mb-3 flex items-center justify-between gap-2">
                <h3 class="text-lg font-semibold">Báo cáo hóa đơn gần nhất</h3>
                <div class="space-x-2">
                    <a class="rounded-lg bg-emerald-600 px-3 py-1.5 text-xs font-semibold text-white" th:href="@{/admin/reports/invoices/excel(day=${filterDay}, month=${filterMonth}, year=${filterYear})}">Excel</a>
                    <a class="rounded-lg bg-rose-600 px-3 py-1.5 text-xs font-semibold text-white" th:href="@{/admin/reports/invoices/pdf(day=${filterDay}, month=${filterMonth}, year=${filterYear})}">PDF</a>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full text-sm">
                    <thead>
                    <tr class="border-b text-left">
                        <th class="p-2">Mã HĐ</th>
                        <th class="p-2">Đặt phòng</th>
                        <th class="p-2">Nhân viên</th>
                        <th class="p-2">Tổng tiền</th>
                        <th class="p-2">Ngày tạo</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr class="border-b" th:each="item : ${invoiceReports}">
                        <td class="p-2" th:text="${'#' + item.hoaDonId}"></td>
                        <td class="p-2" th:text="${item.datPhongId}"></td>
                        <td class="p-2" th:text="${item.nhanVien}"></td>
                        <td class="p-2 font-medium text-teal-700" th:text="${#numbers.formatDecimal(item.tongTien, 0, 'COMMA', 0, 'POINT')} + ' VND'"></td>
                        <td class="p-2 text-slate-500" th:text="${#temporals.format(item.ngayTao, 'dd/MM/yyyy HH:mm')}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <section class="rounded-2xl bg-white p-5 shadow-sm">
            <div class="mb-3 flex items-center justify-between gap-2">
                <h3 class="text-lg font-semibold">Báo cáo thanh toán gần nhất</h3>
                <div class="space-x-2">
                    <a class="rounded-lg bg-emerald-600 px-3 py-1.5 text-xs font-semibold text-white" th:href="@{/admin/reports/payments/excel(day=${filterDay}, month=${filterMonth}, year=${filterYear})}">Excel</a>
                    <a class="rounded-lg bg-rose-600 px-3 py-1.5 text-xs font-semibold text-white" th:href="@{/admin/reports/payments/pdf(day=${filterDay}, month=${filterMonth}, year=${filterYear})}">PDF</a>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full text-sm">
                    <thead>
                    <tr class="border-b text-left">
                        <th class="p-2">Mã TT</th>
                        <th class="p-2">Mã HĐ</th>
                        <th class="p-2">Phương thức</th>
                        <th class="p-2">Số tiền</th>
                        <th class="p-2">Ngày thanh toán</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr class="border-b" th:each="item : ${paymentReports}">
                        <td class="p-2" th:text="${'#' + item.thanhToanId}"></td>
                        <td class="p-2" th:text="${item.hoaDonId != null ? '#' + item.hoaDonId : ''}"></td>
                        <td class="p-2" th:text="${item.phuongThuc}"></td>
                        <td class="p-2 font-medium text-orange-700" th:text="${#numbers.formatDecimal(item.soTien, 0, 'COMMA', 0, 'POINT')} + ' VND'"></td>
                        <td class="p-2 text-slate-500" th:text="${#temporals.format(item.ngayThanhToan, 'dd/MM/yyyy HH:mm')}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>
</section>
</body>
</html>
