<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<section class="space-y-4 section-panel" id="section-dashboard" th:fragment="panel">
    <h2 class="text-2xl font-bold">Dashboard quản trị</h2>
    <div class="grid gap-4 sm:grid-cols-2 xl:grid-cols-4">
        <div class="rounded-xl bg-white p-4 shadow-sm"><p class="text-sm text-slate-500">Doanh thu</p><p class="text-2xl font-bold" id="stat-revenue">0</p></div>
        <div class="rounded-xl bg-white p-4 shadow-sm"><p class="text-sm text-slate-500">Hóa đơn</p><p class="text-2xl font-bold" id="stat-invoices">0</p></div>
        <div class="rounded-xl bg-white p-4 shadow-sm"><p class="text-sm text-slate-500">Khách hàng</p><p class="text-2xl font-bold" id="stat-customers">0</p></div>
        <div class="rounded-xl bg-white p-4 shadow-sm"><p class="text-sm text-slate-500">Phòng</p><p class="text-2xl font-bold" id="stat-rooms">0</p></div>
    </div>
</section>
</body>
</html>
