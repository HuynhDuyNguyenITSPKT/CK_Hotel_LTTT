<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<section class="mt-6 rounded-xl bg-white p-4 shadow-sm space-y-4" id="section-services" th:fragment="panel" th:if="${activeTab == 'services'}">
    <div class="flex flex-wrap items-center justify-between gap-2">
        <h3 class="text-lg font-semibold">Quản lý dịch vụ</h3>
        <span class="rounded-full bg-orange-100 px-3 py-1 text-xs font-semibold text-orange-700">Media managed by Cloudinary</span>
    </div>

    <form class="grid gap-3 rounded-2xl border border-slate-200 bg-slate-50/80 p-4 md:grid-cols-4" enctype="multipart/form-data" method="post" th:action="@{/admin/services}">
        <input class="rounded-lg border border-slate-300 bg-white px-3 py-2" name="ten" placeholder="Tên dịch vụ" required>
        <input class="rounded-lg border border-slate-300 bg-white px-3 py-2" name="gia" placeholder="Giá" required step="0.01" type="number">
        <input accept="image/*" class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm file:mr-3 file:rounded-md file:border-0 file:bg-orange-500 file:px-3 file:py-1.5 file:font-semibold file:text-white hover:file:bg-orange-600" name="imageFile" type="file">
        <button class="rounded-lg bg-orange-500 px-4 py-2 font-semibold text-white transition hover:bg-orange-600" type="submit">Thêm dịch vụ</button>
    </form>

    <div class="overflow-x-auto rounded-2xl border border-slate-200">
        <table class="min-w-full text-sm">
            <thead class="bg-slate-50">
            <tr class="border-b text-left text-slate-700">
                <th class="p-2">Tên</th>
                <th class="p-2">Giá</th>
                <th class="p-2">Ảnh</th>
                <th class="p-2">Chi tiết</th>
                <th class="p-2">Cập nhật</th>
                <th class="p-2">Xóa</th>
            </tr>
            </thead>
            <tbody>
            <tr class="border-b" th:classappend="${iter.odd} ? ' bg-slate-50'" th:each="service,iter : ${services}">
                <td class="p-2" th:text="${service.ten}"></td>
                <td class="p-2" th:text="${#numbers.formatDecimal(service.gia, 0, 'COMMA', 0, 'POINT')} + ' VND'"></td>
                <td class="p-2">
                    <div class="flex items-center gap-2">
                        <img class="h-12 w-16 rounded-lg object-cover ring-1 ring-slate-200" th:if="${service.imageUrl}" th:src="${service.imageUrl}" alt="service image">
                        <span class="text-xs text-slate-400" th:if="${service.imageUrl == null}">Chưa có ảnh</span>
                    </div>
                </td>
                <td class="p-2">
                    <button class="rounded bg-teal-600 px-3 py-1 text-xs font-semibold text-white transition hover:bg-teal-700" data-detail-section="Dịch vụ" data-row-detail-btn type="button">Chi tiết</button>
                </td>
                <td class="p-2">
                    <form class="grid gap-2 md:grid-cols-4" enctype="multipart/form-data" method="post" th:action="@{/admin/services/{id}/update(id=${service.id})}">
                        <input class="rounded border border-slate-300 px-2 py-1" name="ten" required th:value="${service.ten}">
                        <input class="rounded border border-slate-300 px-2 py-1" name="gia" required step="0.01" th:value="${service.gia}" type="number">
                        <input accept="image/*" class="rounded border border-slate-300 px-2 py-1 text-xs" name="imageFile" type="file">
                        <input name="imageUrl" th:value="${service.imageUrl}" type="hidden">
                        <button class="rounded bg-amber-500 px-3 py-1 font-semibold text-white transition hover:bg-amber-600" type="submit">Lưu</button>
                    </form>
                </td>
                <td class="p-2">
                    <form method="post" th:action="@{/admin/services/{id}/delete(id=${service.id})}">
                        <button class="rounded bg-rose-600 px-3 py-1 font-semibold text-white transition hover:bg-rose-700" type="submit">Xóa</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
    <div class="mt-4 flex items-center justify-between text-sm text-slate-600" th:if="${totalPages > 1}">
        <p th:text="'Trang ' + ${page} + ' / ' + ${totalPages} + ' - Tổng: ' + ${totalItems}"></p>
        <div class="flex gap-2">
            <a class="rounded border px-3 py-1 hover:bg-slate-100" th:href="@{/admin/dashboard(tab='services',page=${page-1},size=${size})}" th:if="${hasPrev}">Trước</a>
            <a class="rounded border px-3 py-1 hover:bg-slate-100" th:href="@{/admin/dashboard(tab='services',page=${page+1},size=${size})}" th:if="${hasNext}">Sau</a>
        </div>
    </div>
</section>
</body>
</html>
