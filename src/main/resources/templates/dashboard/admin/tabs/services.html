<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<section class="mt-6 space-y-4" id="section-services" th:fragment="panel" th:if="${activeTab == 'services'}">
    <div class="rounded-xl border border-slate-200 bg-white shadow-sm overflow-hidden">
        <div class="flex flex-wrap items-center justify-between gap-3 border-b border-slate-200 bg-slate-50/70 px-5 py-4">
            <div>
                <h3 class="text-lg font-semibold text-slate-800">Quản lý dịch vụ</h3>
                <p class="text-xs text-slate-500">Ngôn ngữ UI đồng bộ với loại phòng và phòng.</p>
            </div>
            <span class="inline-flex items-center gap-1.5 rounded-full border border-orange-100 bg-orange-50 px-2.5 py-1 text-xs font-semibold text-orange-700">
                <i class="fa-solid fa-image text-[10px]"></i>
                Media managed by Cloudinary
            </span>
        </div>

        <div class="px-5 py-4">
            <div class="flex flex-wrap items-center justify-between gap-3">
                <form class="flex min-w-[260px] flex-1 flex-wrap items-center gap-2" method="get" th:action="@{/admin/dashboard}">
                    <input name="tab" type="hidden" value="services">
                    <input name="page" type="hidden" value="1">
                    <input class="min-w-[240px] flex-1 rounded-lg border border-slate-300 px-3 py-2 text-sm" name="q" placeholder="Tìm tên dịch vụ / giá" th:value="${q}">
                    <button class="rounded-lg bg-slate-900 px-4 py-2 text-sm font-semibold text-white transition hover:bg-slate-800" type="submit">Lọc</button>
                </form>
                <button class="inline-flex items-center gap-2 rounded-lg bg-blue-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-blue-700" id="openCreateServiceBtn" type="button">
                    <i class="fa-solid fa-plus"></i>
                    Thêm dịch vụ
                </button>
            </div>
        </div>
    </div>

    <div class="rounded-xl border border-slate-200 bg-white shadow-sm overflow-hidden">
        <div class="flex flex-wrap items-center justify-between gap-3 border-b border-slate-200 px-5 py-4">
            <h4 class="text-base font-semibold text-slate-800">Danh sách dịch vụ</h4>
            <span class="text-xs text-slate-500" th:text="'Tổng: ' + ${totalItems}"></span>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full border-collapse text-sm">
                <thead>
                <tr class="border-b border-slate-200 bg-slate-50 text-left text-xs uppercase tracking-wider text-slate-500">
                    <th class="px-5 py-3.5 font-semibold">Tên</th>
                    <th class="px-5 py-3.5 font-semibold">Giá</th>
                    <th class="px-5 py-3.5 font-semibold">Ảnh</th>
                    <th class="px-5 py-3.5 text-center font-semibold">Chi tiết</th>
                    <th class="px-5 py-3.5 text-right font-semibold">Thao tác</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                <tr class="transition-colors hover:bg-slate-50/70" th:each="service : ${services}">
                    <td class="px-5 py-4 font-semibold text-slate-800" th:text="${service.ten}"></td>
                    <td class="px-5 py-4 text-slate-700">
                        <div class="font-semibold" th:text="${#numbers.formatDecimal(service.gia, 0, 'COMMA', 0, 'POINT')}"></div>
                        <div class="text-xs text-slate-500">VND</div>
                    </td>
                    <td class="px-5 py-4">
                        <div class="h-12 w-16 overflow-hidden rounded-md border border-slate-200 bg-slate-100">
                            <img alt="service image" class="h-full w-full object-cover" th:if="${service.imageUrl}" th:src="${service.imageUrl}">
                            <div class="flex h-full w-full items-center justify-center text-slate-400" th:if="${service.imageUrl == null}">
                                <i class="fa-regular fa-image"></i>
                            </div>
                        </div>
                    </td>
                    <td class="px-5 py-4 text-center">
                        <button class="rounded-md border border-teal-200 bg-teal-50 px-3 py-1.5 text-xs font-semibold text-teal-700 transition hover:bg-teal-100" data-detail-section="Dịch vụ" data-row-detail-btn type="button">
                            Xem chi tiết
                        </button>
                    </td>
                    <td class="px-5 py-4 text-right">
                        <div class="flex items-center justify-end gap-2">
                            <button class="open-edit-service-btn rounded-md p-2 text-slate-400 transition hover:bg-blue-50 hover:text-blue-600"
                                    th:attr="data-service-id=${service.id},data-service-name=${service.ten},data-service-price=${service.gia},data-service-image-url=${service.imageUrl},data-update-url=@{/admin/services/{id}/update(id=${service.id})}"
                                    title="Chỉnh sửa"
                                    type="button">
                                <i class="fa-solid fa-pen"></i>
                            </button>
                            <form method="post" th:action="@{/admin/services/{id}/delete(id=${service.id})}">
                                <button class="rounded-md p-2 text-slate-400 transition hover:bg-rose-50 hover:text-rose-600" title="Xóa" type="submit">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="mt-4 flex items-center justify-between text-sm text-slate-600" th:if="${totalPages > 1}">
        <p th:text="'Trang ' + ${page} + ' / ' + ${totalPages} + ' - Tổng: ' + ${totalItems}"></p>
        <div class="flex gap-2">
            <a class="rounded border px-3 py-1 hover:bg-slate-100" th:href="@{/admin/dashboard(tab='services',page=${page-1},size=${size},q=${q})}" th:if="${hasPrev}">Trước</a>
            <a class="rounded border px-3 py-1 hover:bg-slate-100" th:href="@{/admin/dashboard(tab='services',page=${page+1},size=${size},q=${q})}" th:if="${hasNext}">Sau</a>
        </div>
    </div>

    <div class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-900/55 p-4" id="serviceFormModal">
        <div class="w-full max-w-2xl rounded-2xl bg-white shadow-2xl ring-1 ring-slate-200">
            <div class="flex items-center justify-between border-b border-slate-200 px-5 py-4">
                <h3 class="text-lg font-bold text-slate-800" id="serviceFormTitle">Thêm dịch vụ mới</h3>
                <button class="rounded-lg px-2 py-1 text-slate-500 transition hover:bg-slate-100 hover:text-slate-700" id="closeServiceFormModalBtn" type="button">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <form class="grid gap-3 px-5 py-4 md:grid-cols-2" enctype="multipart/form-data" id="serviceForm" method="post"
                  th:attr="data-create-url=@{/admin/services},data-update-url-pattern=@{/admin/services/{id}/update(id='__id__')}">
                <div>
                    <label class="mb-1 block text-sm font-medium text-slate-700" for="serviceNameInput">Tên dịch vụ</label>
                    <input class="w-full rounded-lg border border-slate-300 px-3 py-2" id="serviceNameInput" name="ten" required>
                </div>
                <div>
                    <label class="mb-1 block text-sm font-medium text-slate-700" for="servicePriceInput">Giá</label>
                    <input class="w-full rounded-lg border border-slate-300 px-3 py-2" id="servicePriceInput" name="gia" required step="0.01" type="number">
                </div>
                <div class="md:col-span-2">
                    <label class="mb-1 block text-sm font-medium text-slate-700" for="serviceImageInput">Hình ảnh</label>
                    <input accept="image/*" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm file:mr-3 file:rounded-md file:border-0 file:bg-blue-600 file:px-3 file:py-1.5 file:font-semibold file:text-white hover:file:bg-blue-700" id="serviceImageInput" name="imageFile" type="file">
                </div>

                <input id="serviceImageUrlInput" name="imageUrl" type="hidden">

                <div class="md:col-span-2 flex justify-end gap-2 border-t border-slate-200 pt-3">
                    <button class="rounded-lg border border-slate-300 px-4 py-2 font-semibold text-slate-700 transition hover:bg-slate-100" id="cancelServiceFormBtn" type="button">Hủy</button>
                    <button class="rounded-lg bg-blue-600 px-4 py-2 font-semibold text-white transition hover:bg-blue-700" id="submitServiceFormBtn" type="submit">Lưu</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        (function () {
            const modal = document.getElementById("serviceFormModal");
            const form = document.getElementById("serviceForm");
            const title = document.getElementById("serviceFormTitle");
            const submitBtn = document.getElementById("submitServiceFormBtn");
            const openCreateBtn = document.getElementById("openCreateServiceBtn");
            const closeBtn = document.getElementById("closeServiceFormModalBtn");
            const cancelBtn = document.getElementById("cancelServiceFormBtn");

            const nameInput = document.getElementById("serviceNameInput");
            const priceInput = document.getElementById("servicePriceInput");
            const imageInput = document.getElementById("serviceImageInput");
            const imageUrlInput = document.getElementById("serviceImageUrlInput");

            if (!modal || !form) {
                return;
            }

            const createUrl = form.dataset.createUrl;
            const updateUrlPattern = form.dataset.updateUrlPattern;

            function showModal() {
                modal.classList.remove("hidden");
                modal.classList.add("flex");
            }

            function hideModal() {
                modal.classList.add("hidden");
                modal.classList.remove("flex");
            }

            function normalizeImageUrl(value) {
                if (!value) {
                    return "";
                }
                const normalized = value.trim();
                if (normalized === "null" || normalized === "undefined") {
                    return "";
                }
                return normalized;
            }

            function openCreateForm() {
                title.textContent = "Thêm dịch vụ mới";
                submitBtn.textContent = "Thêm mới";
                form.action = createUrl;
                form.reset();
                imageUrlInput.value = "";
                showModal();
            }

            function openEditForm(button) {
                const serviceId = button.dataset.serviceId;
                if (!serviceId) {
                    return;
                }

                title.textContent = "Cập nhật dịch vụ";
                submitBtn.textContent = "Lưu thay đổi";
                form.action = button.dataset.updateUrl || updateUrlPattern.replace("__id__", serviceId);
                nameInput.value = button.dataset.serviceName || "";
                priceInput.value = button.dataset.servicePrice || "";
                imageUrlInput.value = normalizeImageUrl(button.dataset.serviceImageUrl);
                imageInput.value = "";
                showModal();
            }

            openCreateBtn?.addEventListener("click", openCreateForm);
            closeBtn?.addEventListener("click", hideModal);
            cancelBtn?.addEventListener("click", hideModal);
            modal.addEventListener("click", function (event) {
                if (event.target === modal) {
                    hideModal();
                }
            });

            document.querySelectorAll(".open-edit-service-btn").forEach(function (button) {
                button.addEventListener("click", function () {
                    openEditForm(button);
                });
            });
        })();
    </script>
</section>
</body>
</html>
