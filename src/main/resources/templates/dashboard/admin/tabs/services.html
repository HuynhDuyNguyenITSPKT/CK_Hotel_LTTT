<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<section class="mt-6 rounded-xl bg-white p-4 shadow-sm space-y-4" id="section-services" th:fragment="panel" th:if="${activeTab == 'services'}">
    <h3 class="text-lg font-semibold">Quản lý dịch vụ</h3>

    <form class="grid gap-3 md:grid-cols-3" method="post" th:action="@{/admin/services}">
        <input class="rounded-lg border px-3 py-2" name="ten" placeholder="Tên dịch vụ" required>
        <input class="rounded-lg border px-3 py-2" name="gia" placeholder="Giá" required step="0.01" type="number">
        <input class="rounded-lg border px-3 py-2" name="imageUrl" placeholder="Image URL">
        <button class="rounded-lg bg-indigo-600 px-4 py-2 text-white md:col-span-3" type="submit">Thêm dịch vụ</button>
    </form>

    <div class="overflow-x-auto">
        <table class="min-w-full text-sm">
            <thead>
            <tr class="border-b text-left">
                <th class="p-2">Tên</th>
                <th class="p-2">Giá</th>
                <th class="p-2">Cập nhật</th>
                <th class="p-2">Xóa</th>
            </tr>
            </thead>
            <tbody>
            <tr class="border-b" th:classappend="${iter.odd} ? ' bg-slate-50'" th:each="service,iter : ${services}">
                <td class="p-2" th:text="${service.ten}"></td>
                <td class="p-2" th:text="${#numbers.formatDecimal(service.gia, 0, 'COMMA', 0, 'POINT')} + ' VND'"></td>
                <td class="p-2">
                    <form class="grid gap-2 md:grid-cols-3" method="post" th:action="@{/admin/services/{id}/update(id=${service.id})}">
                        <input class="rounded border px-2 py-1" name="ten" required th:value="${service.ten}">
                        <input class="rounded border px-2 py-1" name="gia" required step="0.01" th:value="${service.gia}" type="number">
                        <button class="rounded bg-amber-500 px-3 py-1 text-white" type="submit">Lưu</button>
                    </form>
                </td>
                <td class="p-2">
                    <form method="post" th:action="@{/admin/services/{id}/delete(id=${service.id})}">
                        <button class="rounded bg-rose-600 px-3 py-1 text-white" type="submit">Xóa</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
    <div class="mt-4 flex items-center justify-between text-sm text-slate-600" th:if="${totalPages > 1}">
        <p th:text="'Trang ' + ${page} + ' / ' + ${totalPages} + ' - Tổng: ' + ${totalItems}"></p>
        <div class="flex gap-2">
            <a class="rounded border px-3 py-1 hover:bg-slate-100" th:href="@{/admin/dashboard(tab='services',page=${page-1},size=${size})}" th:if="${hasPrev}">Trước</a>
            <a class="rounded border px-3 py-1 hover:bg-slate-100" th:href="@{/admin/dashboard(tab='services',page=${page+1},size=${size})}" th:if="${hasNext}">Sau</a>
        </div>
    </div>
</section>
</body>
</html>
