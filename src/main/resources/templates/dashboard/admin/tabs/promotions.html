<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<section class="mt-6 rounded-xl bg-white p-4 shadow-sm space-y-4" id="section-promotions" th:fragment="panel" th:if="${activeTab == 'promotions'}">
    <h3 class="text-lg font-semibold">Quản lý khuyến mãi</h3>

    <form class="grid gap-3 md:grid-cols-3" method="post" th:action="@{/admin/promotions}">
        <input class="rounded-lg border px-3 py-2" name="ten" placeholder="Tên khuyến mãi" required>
        <select class="rounded-lg border px-3 py-2" name="loaiGiam" required>
            <option th:each="type : ${discountTypes}" th:text="${type}" th:value="${type}"></option>
        </select>
        <input class="rounded-lg border px-3 py-2" name="giaTri" placeholder="Giá trị" required step="0.01" type="number">
        <button class="rounded-lg bg-indigo-600 px-4 py-2 text-white md:col-span-3" type="submit">Thêm khuyến mãi</button>
    </form>

    <div class="overflow-x-auto">
        <table class="min-w-full text-sm">
            <thead>
            <tr class="border-b text-left">
                <th class="p-2">Tên</th>
                <th class="p-2">Loại giảm</th>
                <th class="p-2">Giá trị</th>
                <th class="p-2">Cập nhật</th>
                <th class="p-2">Xóa</th>
            </tr>
            </thead>
            <tbody>
            <tr class="border-b" th:classappend="${iter.odd} ? ' bg-slate-50'" th:each="promotion,iter : ${promotions}">
                <td class="p-2" th:text="${promotion.ten}"></td>
                <td class="p-2">
                    <span class="rounded-full px-2 py-1 text-xs font-semibold"
                          th:classappend="${promotion.loaiGiam.name() == 'PERCENT'} ? ' bg-sky-100 text-sky-700' : ' bg-violet-100 text-violet-700'"
                          th:text="${promotion.loaiGiam}"></span>
                </td>
                <td class="p-2 font-medium text-indigo-700" th:text="${promotion.giaTri}"></td>
                <td class="p-2">
                    <form class="grid gap-2 md:grid-cols-4" method="post" th:action="@{/admin/promotions/{id}/update(id=${promotion.id})}">
                        <input class="rounded border px-2 py-1" name="ten" required th:value="${promotion.ten}">
                        <select class="rounded border px-2 py-1" name="loaiGiam" required>
                            <option th:each="type : ${discountTypes}" th:selected="${type == promotion.loaiGiam}" th:text="${type}" th:value="${type}"></option>
                        </select>
                        <input class="rounded border px-2 py-1" name="giaTri" required step="0.01" th:value="${promotion.giaTri}" type="number">
                        <button class="rounded bg-amber-500 px-3 py-1 text-white" type="submit">Lưu</button>
                    </form>
                </td>
                <td class="p-2">
                    <form method="post" th:action="@{/admin/promotions/{id}/delete(id=${promotion.id})}">
                        <button class="rounded bg-rose-600 px-3 py-1 text-white" type="submit">Xóa</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
    <div class="mt-4 flex items-center justify-between text-sm text-slate-600" th:if="${totalPages > 1}">
        <p th:text="'Trang ' + ${page} + ' / ' + ${totalPages} + ' - Tổng: ' + ${totalItems}"></p>
        <div class="flex gap-2">
            <a class="rounded border px-3 py-1 hover:bg-slate-100" th:href="@{/admin/dashboard(tab='promotions',page=${page-1},size=${size})}" th:if="${hasPrev}">Trước</a>
            <a class="rounded border px-3 py-1 hover:bg-slate-100" th:href="@{/admin/dashboard(tab='promotions',page=${page+1},size=${size})}" th:if="${hasNext}">Sau</a>
        </div>
    </div>
</section>
</body>
</html>
