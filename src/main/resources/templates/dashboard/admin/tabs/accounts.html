<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<section class="mt-6 rounded-xl bg-white p-4 shadow-sm" id="section-accounts" th:fragment="panel" th:if="${activeTab == 'accounts'}">
    <h3 class="mb-3 text-lg font-semibold">Quản lý tài khoản</h3>
    <div class="overflow-x-auto">
        <table class="min-w-full text-sm">
            <thead>
            <tr class="border-b text-left">
                <th class="p-2">Username</th>
                <th class="p-2">Email</th>
                <th class="p-2">Nhân viên</th>
                <th class="p-2">Vai trò</th>
                <th class="p-2">Trạng thái</th>
                <th class="p-2">Chi tiết</th>
            </tr>
            </thead>
            <tbody>
            <tr class="border-b" th:classappend="${iter.odd} ? ' bg-slate-50'" th:each="account,iter : ${accounts}">
                <td class="p-2" th:text="${account.username}"></td>
                <td class="p-2" th:text="${account.email}"></td>
                <td class="p-2" th:text="${account.employeeName}"></td>
                <td class="p-2">
                    <span class="rounded-full px-2 py-1 text-xs font-semibold"
                          th:classappend="${account.role.name() == 'ADMIN'} ? ' bg-purple-100 text-purple-700' : (${account.role.name() == 'MANAGER'} ? ' bg-indigo-100 text-indigo-700' : ' bg-cyan-100 text-cyan-700')"
                          th:text="${account.role}"></span>
                </td>
                <td class="p-2">
                    <form class="flex items-center gap-2" method="post" th:action="@{/admin/accounts/{id}/status(id=${account.accountId})}">
                        <select class="rounded border px-2 py-1" name="status">
                            <option th:each="status : ${statuses}" th:selected="${status == account.status}" th:text="${status}" th:value="${status}"></option>
                        </select>
                        <button class="rounded bg-slate-900 px-3 py-1 text-white" type="submit">Lưu</button>
                    </form>
                </td>
                <td class="p-2">
                    <button class="rounded bg-teal-600 px-3 py-1 text-xs font-semibold text-white transition hover:bg-teal-700" data-detail-section="Tài khoản" data-row-detail-btn type="button">Chi tiết</button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
    <div class="mt-4 flex items-center justify-between text-sm text-slate-600" th:if="${totalPages > 1}">
        <p th:text="'Trang ' + ${page} + ' / ' + ${totalPages} + ' - Tổng: ' + ${totalItems}"></p>
        <div class="flex gap-2">
            <a class="rounded border px-3 py-1 hover:bg-slate-100" th:href="@{/admin/dashboard(tab='accounts',page=${page-1},size=${size})}" th:if="${hasPrev}">Trước</a>
            <a class="rounded border px-3 py-1 hover:bg-slate-100" th:href="@{/admin/dashboard(tab='accounts',page=${page+1},size=${size})}" th:if="${hasNext}">Sau</a>
        </div>
    </div>
</section>
</body>
</html>
