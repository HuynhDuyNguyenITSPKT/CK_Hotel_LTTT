<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<aside class="bg-slate-900 text-slate-100" th:fragment="sidebar(currentUser, activeTab)">
    <div class="border-b border-slate-800 px-6 py-5">
        <h1 class="text-lg font-bold"><i class="fa-solid fa-hotel mr-2"></i>Hotel Admin</h1>
        <p class="mt-2 text-sm text-slate-300" th:text="'Xin chào, ' + ${currentUser.employeeName}"></p>
    </div>
    <nav class="space-y-1 px-3 py-4 text-sm">
        <a class="block w-full rounded-lg px-3 py-2 text-left hover:bg-slate-800" th:classappend="${activeTab == 'dashboard'} ? ' bg-slate-800'" th:href="@{/admin/dashboard(tab='dashboard')}">
            <i class="fa-solid fa-chart-column mr-2"></i>Tổng quan
        </a>
        <a class="block w-full rounded-lg px-3 py-2 text-left hover:bg-slate-800" th:classappend="${activeTab == 'accounts'} ? ' bg-slate-800'" th:href="@{/admin/dashboard(tab='accounts')}">
            <i class="fa-solid fa-user-shield mr-2"></i>Tài khoản
        </a>
        <a class="block w-full rounded-lg px-3 py-2 text-left hover:bg-slate-800" th:classappend="${activeTab == 'employees'} ? ' bg-slate-800'" th:href="@{/admin/dashboard(tab='employees')}">
            <i class="fa-solid fa-users-gear mr-2"></i>Nhân viên
        </a>
        <a class="block w-full rounded-lg px-3 py-2 text-left hover:bg-slate-800" th:classappend="${activeTab == 'rooms'} ? ' bg-slate-800'" th:href="@{/admin/dashboard(tab='rooms')}">
            <i class="fa-solid fa-door-open mr-2"></i>Phòng
        </a>
        <a class="block w-full rounded-lg px-3 py-2 text-left hover:bg-slate-800" th:classappend="${activeTab == 'services'} ? ' bg-slate-800'" th:href="@{/admin/dashboard(tab='services')}">
            <i class="fa-solid fa-bell-concierge mr-2"></i>Dịch vụ
        </a>
        <a class="block w-full rounded-lg px-3 py-2 text-left hover:bg-slate-800" th:classappend="${activeTab == 'promotions'} ? ' bg-slate-800'" th:href="@{/admin/dashboard(tab='promotions')}">
            <i class="fa-solid fa-tags mr-2"></i>Khuyến mãi
        </a>
        <a class="block w-full rounded-lg px-3 py-2 text-left hover:bg-slate-800" th:classappend="${activeTab == 'customers'} ? ' bg-slate-800'" th:href="@{/admin/dashboard(tab='customers')}">
            <i class="fa-solid fa-address-book mr-2"></i>Khách hàng
        </a>
    </nav>
    <div class="px-6 pb-6">
        <form method="post" th:action="@{/logout}">
            <button class="w-full rounded-lg bg-rose-600 px-4 py-2 text-sm font-semibold text-white hover:bg-rose-700" type="submit">
                <i class="fa-solid fa-right-from-bracket mr-2"></i>Đăng xuất
            </button>
        </form>
    </div>
</aside>
</body>
</html>
