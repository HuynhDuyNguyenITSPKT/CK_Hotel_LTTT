<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<aside class="relative overflow-hidden bg-slate-950 text-slate-100" th:fragment="sidebar(currentUser, activeTab)">
    <div class="pointer-events-none absolute inset-0 bg-[radial-gradient(circle_at_0%_0%,rgba(20,184,166,0.35),transparent_42%),radial-gradient(circle_at_100%_15%,rgba(249,115,22,0.28),transparent_36%)]"></div>
    <div class="relative border-b border-slate-800/90 px-6 py-6">
        <span class="inline-flex items-center rounded-full border border-amber-300/40 bg-amber-200/10 px-2.5 py-1 text-[10px] font-semibold uppercase tracking-[0.2em] text-amber-200">Control Room</span>
        <h1 class="mt-3 text-lg font-bold"><i class="fa-solid fa-hotel mr-2 text-teal-300"></i>Hotel Admin</h1>
        <p class="mt-2 text-sm text-slate-300" th:text="'Xin chào, ' + ${currentUser.employeeName}"></p>
    </div>
    <nav class="relative space-y-1.5 px-3 py-4 text-sm">
        <a class="block w-full rounded-xl px-3 py-2.5 text-left transition hover:bg-slate-800/80" th:classappend="${activeTab == 'dashboard'} ? ' bg-slate-800 ring-1 ring-slate-700'" th:href="@{/admin/dashboard(tab='dashboard')}">
            <i class="fa-solid fa-chart-column mr-2"></i>Tổng quan
        </a>
        <a class="block w-full rounded-xl px-3 py-2.5 text-left transition hover:bg-slate-800/80" th:classappend="${activeTab == 'accounts'} ? ' bg-slate-800 ring-1 ring-slate-700'" th:href="@{/admin/dashboard(tab='accounts')}">
            <i class="fa-solid fa-user-shield mr-2"></i>Tài khoản
        </a>
        <a class="block w-full rounded-xl px-3 py-2.5 text-left transition hover:bg-slate-800/80" th:classappend="${activeTab == 'employees'} ? ' bg-slate-800 ring-1 ring-slate-700'" th:href="@{/admin/dashboard(tab='employees')}">
            <i class="fa-solid fa-users-gear mr-2"></i>Nhân viên
        </a>
        <a class="block w-full rounded-xl px-3 py-2.5 text-left transition hover:bg-slate-800/80" th:classappend="${activeTab == 'rooms'} ? ' bg-slate-800 ring-1 ring-slate-700'" th:href="@{/admin/dashboard(tab='rooms')}">
            <i class="fa-solid fa-door-open mr-2"></i>Phòng
        </a>
        <a class="block w-full rounded-xl px-3 py-2.5 text-left transition hover:bg-slate-800/80" th:classappend="${activeTab == 'services'} ? ' bg-slate-800 ring-1 ring-slate-700'" th:href="@{/admin/dashboard(tab='services')}">
            <i class="fa-solid fa-bell-concierge mr-2"></i>Dịch vụ
        </a>
        <a class="block w-full rounded-xl px-3 py-2.5 text-left transition hover:bg-slate-800/80" th:classappend="${activeTab == 'promotions'} ? ' bg-slate-800 ring-1 ring-slate-700'" th:href="@{/admin/dashboard(tab='promotions')}">
            <i class="fa-solid fa-tags mr-2"></i>Khuyến mãi
        </a>
        <a class="block w-full rounded-xl px-3 py-2.5 text-left transition hover:bg-slate-800/80" th:classappend="${activeTab == 'customers'} ? ' bg-slate-800 ring-1 ring-slate-700'" th:href="@{/admin/dashboard(tab='customers')}">
            <i class="fa-solid fa-address-book mr-2"></i>Khách hàng
        </a>
    </nav>
    <div class="relative px-6 pb-6 pt-2">
        <form method="post" th:action="@{/logout}">
            <button class="w-full rounded-xl bg-rose-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-rose-700" type="submit">
                <i class="fa-solid fa-right-from-bracket mr-2"></i>Đăng xuất
            </button>
        </form>
    </div>
</aside>
</body>
</html>
