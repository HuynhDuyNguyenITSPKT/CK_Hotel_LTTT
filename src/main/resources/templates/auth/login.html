<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - Hệ thống khách sạn</title>
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
</head>
<body class="min-h-screen bg-slate-100 text-slate-800">
<div class="mx-auto flex min-h-screen w-full max-w-6xl items-center justify-center px-4 py-8">
    <div class="grid w-full max-w-5xl overflow-hidden rounded-3xl bg-white shadow-2xl lg:grid-cols-2">
        <section class="hidden bg-gradient-to-br from-indigo-700 via-blue-700 to-cyan-600 p-10 text-white lg:block">
            <p class="inline-flex items-center gap-2 rounded-full border border-white/30 px-4 py-1 text-sm">
                <i class="fa-solid fa-hotel"></i>
                Hệ thống quản lý khách sạn
            </p>
            <h1 class="mt-6 text-3xl font-bold leading-tight">Quản trị tập trung cho Admin, Quản lý và Lễ tân</h1>
            <p class="mt-4 text-sm text-blue-100">Đăng nhập để truy cập đúng màn hình nghiệp vụ theo vai trò của bạn.</p>
            <div class="mt-10 space-y-3 text-sm text-blue-100">
                <p><i class="fa-solid fa-shield-halved mr-2"></i>Bảo mật phiên đăng nhập</p>
                <p><i class="fa-solid fa-chart-line mr-2"></i>Dashboard rõ ràng theo chức năng</p>
                <p><i class="fa-solid fa-users-gear mr-2"></i>Quản lý tài khoản và nhân viên nhanh</p>
            </div>
        </section>

        <section class="p-6 sm:p-10">
            <h2 class="text-2xl font-bold">Đăng nhập hệ thống</h2>
            <p class="mt-2 text-sm text-slate-500">Nhập tài khoản để tiếp tục.</p>

            <div class="mt-4 rounded-xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700"
                 th:if="${error != null and !#strings.isEmpty(error)}" th:text="${error}"></div>

            <form class="mt-6 space-y-4" method="post" th:action="@{/login}">
                <div>
                    <label class="mb-1 block text-sm font-medium" for="username">Tên đăng nhập</label>
                    <div class="flex items-center gap-2 rounded-xl border border-slate-300 px-3 focus-within:border-indigo-500 focus-within:ring-2 focus-within:ring-indigo-200">
                        <i class="fa-regular fa-user text-slate-400"></i>
                        <input class="w-full border-0 bg-transparent py-2.5 text-sm outline-none" id="username" name="username" required type="text">
                    </div>
                </div>

                <div>
                    <label class="mb-1 block text-sm font-medium" for="password">Mật khẩu</label>
                    <div class="flex items-center gap-2 rounded-xl border border-slate-300 px-3 focus-within:border-indigo-500 focus-within:ring-2 focus-within:ring-indigo-200">
                        <i class="fa-solid fa-lock text-slate-400"></i>
                        <input class="w-full border-0 bg-transparent py-2.5 text-sm outline-none" id="password" name="password" required type="password">
                    </div>
                </div>

                <button class="inline-flex w-full items-center justify-center gap-2 rounded-xl bg-indigo-600 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-indigo-700" type="submit">
                    <i class="fa-solid fa-arrow-right-to-bracket"></i>
                    Đăng nhập
                </button>
            </form>
        </section>
    </div>
</div>
</body>
</html>
