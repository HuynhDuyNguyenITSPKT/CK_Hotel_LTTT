<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - Hệ thống khách sạn</title>
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container min-vh-100 d-flex align-items-center justify-content-center py-4">
    <div class="col-12 col-sm-10 col-md-7 col-lg-5">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4 p-md-5">
                <h1 class="h3 fw-bold mb-2 text-center">Đăng nhập hệ thống</h1>
                <p class="text-secondary text-center mb-4">Đăng nhập để vào giao diện theo vai trò.</p>

                <div class="alert alert-danger" role="alert" th:if="${error != null and !#strings.isEmpty(error)}" th:text="${error}"></div>

                <form class="d-grid gap-3" method="post" th:action="@{/login}">
                    <div>
                        <label class="form-label" for="username">Username</label>
                        <input class="form-control" id="username" name="username" required type="text">
                    </div>

                    <div>
                        <label class="form-label" for="password">Password</label>
                        <input class="form-control" id="password" name="password" required type="password">
                    </div>

                    <button class="btn btn-primary w-100" type="submit">Đăng nhập</button>
                </form>

                <hr class="my-4">

            </div>
        </div>
    </div>
</div>
<script crossorigin="anonymous" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
